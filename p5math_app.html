<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 P5 Math Adventure</title>
<style>
  :root {
    --primary: #6C63FF;
    --secondary: #FF6584;
    --accent: #43D8A0;
    --yellow: #FFD166;
    --orange: #FF9F43;
    --bg: #F0F4FF;
    --card: #ffffff;
    --text: #2D3748;
    --light: #EDF2F7;
    --shadow: 0 4px 20px rgba(108,99,255,0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ---- HEADER ---- */
  header { background: linear-gradient(135deg, var(--primary), #a78bfa); color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 2px 12px rgba(0,0,0,0.2); position: sticky; top: 0; z-index: 100; }
  .logo { font-size: 1.5rem; font-weight: 800; display: flex; align-items: center; gap: 8px; }
  .stars-display { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.2); padding: 6px 14px; border-radius: 20px; font-weight: 700; font-size: 1rem; }

  .home-btn { text-decoration: none;  background: #ffdd57;  padding: 8px 14px;  border-radius: 12px;  font-weight: bold;  color: #333;  box-shadow: 0 4px 8px rgba(0,0,0,0.1);}
  .home-btn:hover {  background: #ffd43b; }
  
  /* ---- SCREENS ---- */
  .screen { display: none; padding: 24px; max-width: 960px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ---- HOME ---- */
  .hero { text-align: center; padding: 32px 16px 24px; }
  .hero h1 { font-size: 2.2rem; color: var(--primary); font-weight: 800; }
  .hero p { font-size: 1.1rem; color: #666; margin-top: 8px; }
  .progress-bar-outer { background: #e2e8f0; border-radius: 12px; height: 14px; margin: 16px auto; max-width: 400px; overflow: hidden; }
  .progress-bar-inner { height: 100%; border-radius: 12px; background: linear-gradient(90deg, var(--accent), var(--primary)); transition: width 0.6s ease; }
  .progress-label { font-size: 0.85rem; color: #888; margin-top: 4px; }

  .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 24px; }
  .topic-card { background: var(--card); border-radius: 20px; padding: 24px; cursor: pointer; box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; border: 3px solid transparent; position: relative; overflow: hidden; }
  .topic-card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(108,99,255,0.22); }
  .topic-card .card-icon { font-size: 2.8rem; margin-bottom: 10px; }
  .topic-card h3 { font-size: 1.15rem; font-weight: 700; color: var(--text); }
  .topic-card p { font-size: 0.85rem; color: #777; margin-top: 4px; }
  .topic-card .card-progress { margin-top: 12px; }
  .topic-card .mini-bar { background: #e2e8f0; border-radius: 6px; height: 8px; overflow: hidden; }
  .topic-card .mini-fill { height: 100%; border-radius: 6px; transition: width 0.5s; }
  .topic-card .star-count { font-size: 0.8rem; color: #999; margin-top: 4px; }
  .badge-new { position: absolute; top: 12px; right: 12px; background: var(--secondary); color: white; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }
  .badge-done { position: absolute; top: 12px; right: 12px; background: var(--accent); color: white; font-size: 0.7rem; font-weight: 700; padding: 2px 8px; border-radius: 10px; }

  /* ---- TOPIC SCREEN ---- */
  .back-btn { display: inline-flex; align-items: center; gap: 6px; background: white; border: 2px solid var(--primary); color: var(--primary); font-weight: 700; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; margin-bottom: 20px; }
  .back-btn:hover { background: var(--primary); color: white; }
  .topic-header { text-align: center; margin-bottom: 24px; }
  .topic-header .icon-big { font-size: 3.5rem; }
  .topic-header h2 { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-top: 8px; }

  .tab-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
  .tab-btn { padding: 10px 22px; border-radius: 20px; border: 2px solid #ddd; background: white; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; color: #666; }
  .tab-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
  .tab-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* ---- LEARN TAB ---- */
  .concept-box { background: white; border-radius: 20px; padding: 24px; margin-bottom: 20px; box-shadow: var(--shadow); }
  .concept-box h3 { font-size: 1.2rem; color: var(--primary); font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
  .concept-box p { color: #555; line-height: 1.7; margin-bottom: 10px; }
  .formula-box { background: linear-gradient(135deg, #f0f4ff, #e8f0fe); border-left: 4px solid var(--primary); padding: 14px 18px; border-radius: 10px; margin: 12px 0; font-size: 1.1rem; font-weight: 700; color: var(--primary); }
  .tip-box { background: #fffbeb; border-left: 4px solid var(--yellow); padding: 12px 16px; border-radius: 10px; margin: 12px 0; font-size: 0.9rem; color: #92400e; }
  .tip-box strong { color: #d97706; }
  .example-box { background: #f0fdf4; border-left: 4px solid var(--accent); padding: 14px 18px; border-radius: 10px; margin: 12px 0; }
  .example-box .ex-title { font-weight: 700; color: #065f46; margin-bottom: 6px; }
  .example-box p { color: #047857; font-size: 0.95rem; }

  /* Visual diagrams */
  .visual-area { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; margin: 16px 0; }
  .number-block { background: linear-gradient(135deg, var(--primary), #a78bfa); color: white; padding: 10px 16px; border-radius: 12px; font-weight: 700; font-size: 1.1rem; text-align: center; min-width: 80px; }
  .place-table { width: 100%; border-collapse: collapse; border-radius: 12px; overflow: hidden; margin: 16px 0; }
  .place-table th { background: var(--primary); color: white; padding: 10px 12px; font-size: 0.9rem; }
  .place-table td { padding: 10px 12px; border: 1px solid #e2e8f0; text-align: center; font-weight: 600; }
  .place-table tr:nth-child(even) td { background: #f7f9ff; }
  .triangle-svg { display: block; margin: 0 auto; }

  /* ---- PRACTICE TAB ---- */
  .practice-intro { text-align: center; margin-bottom: 20px; color: #666; }
  .level-selector { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
  .level-btn { padding: 8px 20px; border-radius: 20px; border: 2px solid; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
  .level-btn.easy { border-color: var(--accent); color: var(--accent); background: white; }
  .level-btn.easy.active, .level-btn.easy:hover { background: var(--accent); color: white; }
  .level-btn.medium { border-color: var(--yellow); color: #d97706; background: white; }
  .level-btn.medium.active, .level-btn.medium:hover { background: var(--yellow); color: #92400e; }
  .level-btn.hard { border-color: var(--secondary); color: var(--secondary); background: white; }
  .level-btn.hard.active, .level-btn.hard:hover { background: var(--secondary); color: white; }

  .question-card { background: white; border-radius: 20px; padding: 24px; box-shadow: var(--shadow); }
  .q-number { font-size: 0.85rem; color: #999; font-weight: 600; margin-bottom: 8px; }
  .q-text { font-size: 1.1rem; color: var(--text); line-height: 1.7; margin-bottom: 20px; font-weight: 500; }
  .q-image { text-align: center; margin: 16px 0; }
  .answer-row { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
  .answer-input { padding: 10px 14px; border: 2px solid #ddd; border-radius: 10px; font-size: 1.1rem; font-weight: 600; width: 160px; outline: none; transition: border-color 0.2s; }
  .answer-input:focus { border-color: var(--primary); }
  .answer-input.correct { border-color: var(--accent); background: #f0fdf4; color: #065f46; }
  .answer-input.wrong { border-color: var(--secondary); background: #fff5f5; color: #c53030; }
  .mcq-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .mcq-opt { padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; font-weight: 600; transition: all 0.2s; text-align: center; font-size: 0.95rem; }
  .mcq-opt:hover { border-color: var(--primary); background: #f0f4ff; }
  .mcq-opt.selected { border-color: var(--primary); background: var(--primary); color: white; }
  .mcq-opt.correct-ans { border-color: var(--accent); background: #f0fdf4; color: #065f46; }
  .mcq-opt.wrong-ans { border-color: var(--secondary); background: #fff5f5; color: #c53030; }

  .btn-row { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .btn-primary { padding: 10px 24px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 1rem; transition: all 0.2s; }
  .btn-primary:hover { background: #5a52d5; transform: translateY(-1px); }
  .btn-secondary { padding: 10px 20px; background: white; color: var(--primary); border: 2px solid var(--primary); border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
  .btn-secondary:hover { background: #f0f4ff; }
  .btn-hint { padding: 8px 16px; background: #fffbeb; color: #d97706; border: 2px solid var(--yellow); border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 0.85rem; }
  .btn-hint:hover { background: var(--yellow); color: #92400e; }

  .feedback-box { padding: 14px 18px; border-radius: 12px; margin-top: 14px; font-weight: 600; font-size: 1rem; display: none; }
  .feedback-box.correct { background: #f0fdf4; color: #065f46; border: 2px solid var(--accent); display: block; }
  .feedback-box.wrong { background: #fff5f5; color: #c53030; border: 2px solid var(--secondary); display: block; }
  .hint-box { background: #fffbeb; border: 2px solid var(--yellow); border-radius: 12px; padding: 12px 16px; margin-top: 12px; color: #92400e; font-size: 0.95rem; display: none; }
  .hint-box.show { display: block; }

  .q-nav { display: flex; align-items: center; gap: 12px; margin-top: 20px; justify-content: space-between; }
  .q-dots { display: flex; gap: 6px; }
  .q-dot { width: 10px; height: 10px; border-radius: 50%; background: #ddd; transition: background 0.2s; }
  .q-dot.done { background: var(--accent); }
  .q-dot.current { background: var(--primary); }
  .q-dot.wrong { background: var(--secondary); }

  /* ---- QUIZ TAB ---- */
  .quiz-start { text-align: center; padding: 32px 16px; }
  .quiz-start h3 { font-size: 1.5rem; color: var(--primary); font-weight: 800; margin-bottom: 8px; }
  .quiz-start p { color: #666; margin-bottom: 24px; }
  .quiz-stats { display: flex; gap: 24px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap; }
  .stat-box { background: white; border-radius: 16px; padding: 16px 24px; text-align: center; box-shadow: var(--shadow); }
  .stat-box .stat-num { font-size: 2rem; font-weight: 800; color: var(--primary); }
  .stat-box .stat-label { font-size: 0.8rem; color: #999; font-weight: 600; }
  .timer-bar { height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; margin-bottom: 16px; }
  .timer-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--primary)); border-radius: 4px; transition: width 0.5s linear; }
  .timer-label { font-size: 0.85rem; color: #888; text-align: right; margin-bottom: 4px; }

  /* ---- RESULTS ---- */
  .results-screen { text-align: center; padding: 32px 16px; }
  .results-screen .score-circle { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0 auto 20px; box-shadow: 0 6px 24px rgba(108,99,255,0.35); }
  .score-circle .score-num { font-size: 2.2rem; font-weight: 800; line-height: 1; }
  .score-circle .score-denom { font-size: 0.9rem; opacity: 0.85; }
  .trophy { font-size: 4rem; margin-bottom: 8px; }
  .results-screen h3 { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
  .results-screen p { color: #666; margin: 8px 0 20px; }
  .star-reward { display: flex; gap: 8px; justify-content: center; font-size: 1.8rem; margin: 16px 0; }

  /* ---- GAME TAB ---- */
  .game-container { background: white; border-radius: 20px; padding: 24px; box-shadow: var(--shadow); text-align: center; }
  .game-container h3 { font-size: 1.3rem; color: var(--primary); font-weight: 800; margin-bottom: 6px; }
  .game-container p { color: #666; font-size: 0.9rem; margin-bottom: 20px; }
  .balloon-area { height: 300px; position: relative; background: linear-gradient(180deg, #e0f2fe, #bfdbfe); border-radius: 16px; overflow: hidden; margin-bottom: 20px; cursor: pointer; }
  .balloon { position: absolute; font-size: 2.5rem; cursor: pointer; transition: transform 0.1s; user-select: none; }
  .balloon:hover { transform: scale(1.1); }
  .balloon-label { position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); background: white; border-radius: 8px; padding: 2px 8px; font-size: 0.8rem; font-weight: 700; color: var(--text); white-space: nowrap; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
  .game-q { font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 16px; padding: 12px 20px; background: #f7f9ff; border-radius: 12px; }
  .game-score { font-size: 1.1rem; font-weight: 700; color: var(--primary); }
  .game-lives { display: flex; gap: 4px; justify-content: center; margin-bottom: 8px; font-size: 1.3rem; }
  .number-pad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 300px; margin: 0 auto; }
  .pad-btn { padding: 14px; background: #f0f4ff; border: 2px solid #ddd; border-radius: 12px; font-size: 1.1rem; font-weight: 700; cursor: pointer; transition: all 0.15s; color: var(--text); }
  .pad-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
  .pad-btn.op { background: #fff0f6; border-color: var(--secondary); color: var(--secondary); }
  .display-box { background: #2d3748; color: white; padding: 14px 20px; border-radius: 12px; font-size: 1.5rem; font-weight: 700; text-align: right; min-height: 52px; margin-bottom: 12px; font-family: monospace; letter-spacing: 2px; }

  /* Animations */
  @keyframes popIn { 0%{transform:scale(0)} 80%{transform:scale(1.1)} 100%{transform:scale(1)} }
  @keyframes floatUp { from{transform:translateY(0);opacity:1} to{transform:translateY(-60px);opacity:0} }
  @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
  @keyframes confetti { 0%{transform:translateY(-10px) rotate(0deg);opacity:1} 100%{transform:translateY(300px) rotate(360deg);opacity:0} }
  .pop { animation: popIn 0.3s ease; }
  .float-score { position: fixed; font-size: 1.3rem; font-weight: 800; color: var(--accent); pointer-events: none; animation: floatUp 1s ease forwards; z-index: 999; }
  .confetti-piece { position: fixed; width: 10px; height: 10px; border-radius: 2px; pointer-events: none; animation: confetti 2s ease forwards; z-index: 1000; }

  /* Nav breadcrumb */
  .breadcrumb { font-size: 0.85rem; color: #999; margin-bottom: 16px; }
  .breadcrumb span { color: var(--primary); font-weight: 600; }

  /* Responsive */
  @media(max-width:600px) {
    .mcq-options { grid-template-columns: 1fr; }
    .topics-grid { grid-template-columns: 1fr 1fr; }
    header { padding: 12px 16px; }
    .logo { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<header>
  <a href="index.html" class="home-btn">🏠 Home</a>
  <div class="logo">🌟 P5 Math Adventure</div>
  <div class="stars-display">⭐ <span id="totalStars">0</span> Stars</div>
</header>

<!-- HOME SCREEN -->
<div class="screen active" id="homeScreen">
  <div class="hero">
    <h1>🚀 Let's Learn P5 Maths!</h1>
    <p>Pick a topic, learn with fun, and earn stars! ⭐</p>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="overallBar" style="width:0%"></div>
    </div>
    <div class="progress-label" id="overallLabel">0 of 6 topics mastered</div>
  </div>
  <div class="topics-grid" id="topicsGrid"></div>
</div>

<!-- TOPIC SCREEN -->
<div class="screen" id="topicScreen">
  <button class="back-btn" onclick="goHome()">← Home</button>
  <div class="topic-header">
    <div class="icon-big" id="topicIcon"></div>
    <h2 id="topicTitle"></h2>
  </div>
  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('learn')">📖 Learn</button>
    <button class="tab-btn" onclick="switchTab('practice')">✏️ Practice</button>
    <button class="tab-btn" onclick="switchTab('quiz')">⏱️ Quiz</button>
    <button class="tab-btn" onclick="switchTab('game')">🎮 Game</button>
  </div>
  <div class="tab-content active" id="learnTab"></div>
  <div class="tab-content" id="practiceTab"></div>
  <div class="tab-content" id="quizTab"></div>
  <div class="tab-content" id="gameTab"></div>
</div>

<script>
// ============================================================
//  DATA STORE
// ============================================================
const progress = JSON.parse(localStorage.getItem('p5progress') || '{}');
let totalStars = parseInt(localStorage.getItem('p5stars') || '0');

function saveProgress() {
  localStorage.setItem('p5progress', JSON.stringify(progress));
  localStorage.setItem('p5stars', totalStars);
  document.getElementById('totalStars').textContent = totalStars;
}

// ============================================================
//  TOPICS CONFIG
// ============================================================
const topics = [
  {
    id: 'whole',
    icon: '🔢',
    title: 'Whole Numbers',
    desc: 'Numbers to 1 million, rounding, factors & multiples',
    color: '#6C63FF',
    fill: '#a78bfa',
  },
  {
    id: 'fractions',
    icon: '🍕',
    title: 'Fractions',
    desc: 'Adding, subtracting, multiplying fractions & word problems',
    color: '#FF6584',
    fill: '#fda4af',
  },
  {
    id: 'decimals',
    icon: '💧',
    title: 'Decimals',
    desc: 'Place values, operations & challenging word problems',
    color: '#0ea5e9',
    fill: '#7dd3fc',
  },
  {
    id: 'triangle',
    icon: '📐',
    title: 'Area of Triangle',
    desc: 'Base, height, composite figures & visualisation',
    color: '#43D8A0',
    fill: '#6ee7b7',
  },
  {
    id: 'volume',
    icon: '📦',
    title: 'Volume',
    desc: 'Units, cubes, cuboids, liquid & word problems',
    color: '#FF9F43',
    fill: '#fcd34d',
  },
  {
    id: 'percentage',
    icon: '💯',
    title: 'Percentage',
    desc: 'Finding %, percentage of quantity, increase & decrease',
    color: '#8b5cf6',
    fill: '#c4b5fd',
  },
  {
    id: 'barmodel',
    icon: '📊',
    title: 'Bar Models',
    desc: 'Part-whole, comparison, fractions, before-after & multi-step',
    color: '#e11d48',
    fill: '#fda4af',
  },
];

let currentTopic = null;
let currentTab = 'learn';
let practiceLevel = 'easy';
let practiceQIndex = 0;
let practiceAnswered = [];
let quizQIndex = 0;
let quizScore = 0;
let quizAnswered = [];
let quizTimer = null;
let quizTimeLeft = 0;
let quizStarted = false;
let gameScore = 0;
let gameLives = 3;

// ============================================================
//  LEARN CONTENT
// ============================================================
const learnContent = {
  whole: `
    <div class="concept-box">
      <h3>🔢 1. Numbers up to 1,000,000</h3>
      <p>In P5, we work with numbers all the way up to <strong>one million</strong>! Let's understand how digits are placed.</p>
      <table class="place-table">
        <tr>
          <th>Millions</th><th>Hundred Thousands</th><th>Ten Thousands</th><th>Thousands</th><th>Hundreds</th><th>Tens</th><th>Ones</th>
        </tr>
        <tr>
          <td>1</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td>
        </tr>
      </table>
      <div class="example-box">
        <div class="ex-title">✏️ Example</div>
        <p>3,254,019 = 3 millions + 2 hundred thousands + 5 ten thousands + 4 thousands + 0 hundreds + 1 ten + 9 ones</p>
      </div>
    </div>
    <div class="concept-box">
      <h3>✖️ 2. Multiplying & Dividing by 10, 100, 1000</h3>
      <p>When you <strong>multiply</strong> by 10, 100, or 1000, the digits shift <em>left</em> (zeros are added).</p>
      <p>When you <strong>divide</strong> by 10, 100, or 1000, the digits shift <em>right</em>.</p>
      <div class="visual-area">
        <div class="number-block">× 10 → add 1 zero</div>
        <div class="number-block">× 100 → add 2 zeros</div>
        <div class="number-block">× 1000 → add 3 zeros</div>
      </div>
      <div class="formula-box">215 × 100 = 21,500 &nbsp;&nbsp;|&nbsp;&nbsp; 4,500 ÷ 100 = 45</div>
      <div class="tip-box"><strong>💡 Tip:</strong> Count the zeros in 10/100/1000 — that's how many places the digits move!</div>
    </div>
    <div class="concept-box">
      <h3>🔄 3. Rounding Off Numbers</h3>
      <p>To round a number, look at the digit <em>to the right</em> of your rounding place:</p>
      <div class="visual-area">
        <div class="number-block" style="background:linear-gradient(135deg,#FF6584,#fda4af)">0–4 → Round DOWN</div>
        <div class="number-block" style="background:linear-gradient(135deg,#43D8A0,#6ee7b7)">5–9 → Round UP</div>
      </div>
      <div class="example-box">
        <div class="ex-title">✏️ Examples</div>
        <p>47,836 rounded to nearest 1000 = <strong>48,000</strong> (look at hundreds digit: 8 ≥ 5, round up)</p>

    </div>

    <div class="concept-box">
      <h3>🧩 5. Word Problem Strategy: Supposition</h3>

  fractions: `
    <div class="concept-box">
      <h3>🍕 1. Understanding Fractions</h3>
      <p>A fraction has a <strong>numerator</strong> (top) and <strong>denominator</strong> (bottom).</p>
      <div class="formula-box">Fraction = Numerator / Denominator</div>
      <p>If a pizza is cut into 8 slices and you eat 3 slices: you ate <strong>3/8</strong> of the pizza 🍕</p>
      <div class="tip-box"><strong>💡 Proper fraction:</strong> numerator &lt; denominator (e.g. 3/5)<br>
      <strong>Improper fraction:</strong> numerator &gt; denominator (e.g. 7/4)<br>
      <strong>Mixed number:</strong> whole + fraction (e.g. 1¾)</div>
    </div>
    <div class="concept-box">
      <h3>➕➖ 2. Adding & Subtracting Fractions</h3>
      <p>Same denominator: just add/subtract numerators.<br>Different denominators: find the <strong>LCM</strong> first!</p>
      <div class="formula-box">1/3 + 1/4 → LCM of 3 & 4 = 12 → 4/12 + 3/12 = 7/12</div>
      <div class="example-box">
        <div class="ex-title">✏️ Step-by-Step</div>
        <p>2/3 + 3/5 → LCM = 15 → 10/15 + 9/15 = <strong>19/15 = 1 4/15</strong></p>
      </div>
    </div>
    <div class="concept-box">
      <h3>✖️ 3. Multiplying Fractions</h3>
      <p>Multiply top × top, bottom × bottom. Then simplify!</p>
      <div class="formula-box">a/b × c/d = (a×c) / (b×d)</div>
      <div class="example-box">
        <div class="ex-title">✏️ Example</div>
        <p>2/3 × 3/4 = 6/12 = <strong>1/2</strong></p>
        <p>"Of" means multiply! → ¾ of 24 = ¾ × 24 = <strong>18</strong></p>
      </div>
      <div class="tip-box"><strong>💡 Simplify early!</strong> Cancel common factors before multiplying to keep numbers small.</div>
    </div>
    <div class="concept-box">
      <h3>🧩 4. Fraction Word Problems (Multi-step)</h3>
      <p>Draw a <strong>model</strong> to help you visualise the parts!</p>
      <div class="example-box">
        <div class="ex-title">✏️ Example</div>
        <p>Henry spent 1/3 of his salary and gave 1/4 of the remaining to his wife. What fraction does he have left?</p>

        <p>Gave wife = 1/4 × 2/3 = <strong>1/6</strong></p>
        <p>Left = 2/3 − 1/6 = 4/6 − 1/6 = <strong>3/6 = 1/2</strong></p>
      </div>
    </div>`,

    <div class="concept-box">

      <div class="tri-step">Area = ½ × 10 × 13 = <strong>65 cm²</strong></div>

    <div class="concept-box">

      <p>Area = 36 cm², base = 9 cm. Find height.</p>

      <div class="formula-box" style="text-align:center">🔑 h = (2 × Area) ÷ base</div>

  <div class="tri-subsec" id="ts7">

      <h3>👁️ Common Base / Common Height = Equal Area</h3>

    <div class="concept-box">

        <rect x="20" y="15" width="280" height="140" fill="#fafafa" stroke="#ddd" stroke-width="2"/>

      </svg>

  percentage: `
    <div class="concept-box">
      <h3>💯 1. What is Percentage?</h3>
      <p>Percent means "out of 100". The symbol is <strong>%</strong>.</p>
      <div class="formula-box">Percentage = (Part ÷ Whole) × 100%</div>
      <div class="visual-area">
        <div class="number-block">50% = 1/2</div>
        <div class="number-block" style="background:linear-gradient(135deg,#FF6584,#fda4af)">25% = 1/4</div>
        <div class="number-block" style="background:linear-gradient(135deg,#43D8A0,#6ee7b7);color:#065f46">75% = 3/4</div>
        <div class="number-block" style="background:linear-gradient(135deg,#FF9F43,#fcd34d);color:#92400e">10% = 1/10</div>
      </div>
    </div>
    <div class="concept-box">
      <h3>🔢 2. Finding Percentage of a Quantity</h3>
      <div class="formula-box">X% of Y = (X ÷ 100) × Y</div>
      <div class="example-box">
        <div class="ex-title">✏️ Example</div>
        <p>30% of 240 = (30 ÷ 100) × 240 = 0.3 × 240 = <strong>72</strong></p>
        <p>What % is 45 out of 180? → (45 ÷ 180) × 100 = <strong>25%</strong></p>
      </div>
    </div>
    <div class="concept-box">
      <h3>📈📉 3. Percentage Increase & Decrease</h3>
      <div class="formula-box">% Increase = (Increase ÷ Original) × 100%<br>% Decrease = (Decrease ÷ Original) × 100%</div>
      <div class="example-box">
        <div class="ex-title">✏️ Example — Increase</div>
        <p>Price went from $80 to $100. Increase = $20.<br>% Increase = (20 ÷ 80) × 100 = <strong>25%</strong></p>
      </div>
      <div class="example-box">
        <div class="ex-title">✏️ Example — Decrease</div>
        <p>Sale price is 70% of original. Original = $200.<br>Sale price = 70% × 200 = <strong>$140</strong></p>

      <div class="tip-box"><strong>💡 GST Tip:</strong> If GST = 9%, final price = original × 109% = original × 1.09</div>

        <div class="ex-title">✏️ Multi-step</div>

      <div class="tip-box"><strong>💡 Key phrase "what is left":</strong> If 35% is spent, 65% remains. Use the remainder!</div>
    </div>`,

    <div class="concept-box">
      <h3>📋 Three Main Types</h3>
      <div class="bm-bar-wrap">

      </div>
      <div class="bm-step">Girls = 450 − 180 = <strong>270 girls</strong></div>
    </div>
    <div class="concept-box">
      <h3>Example 3 — Three Parts</h3>
      <p>John spent $45 on food, $28 on transport and saved the rest of his $120. How much did he save?</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">$120</div>
          <div class="bm-bar" style="width:380px">
            <div class="bm-seg" style="width:37%;background:#e11d48"><span>$45 food</span></div>
            <div class="bm-seg" style="width:23%;background:#FF9F43"><span>$28 transport</span></div>
            <div class="bm-seg" style="width:40%;background:#43D8A0;border:3px dashed white"><span>? saved</span></div>
          </div>
        </div>
      </div>
      <div class="bm-step">Saved = $120 − $45 − $28 = <strong>$47</strong></div>
    </div>
    <div class="concept-box">
      <h3>🧮 Interactive Part-Whole</h3>
      <div class="bm-interactive">
        <h4>Find the Whole: enter Part A and Part B</h4>
        <div class="bm-inputs">
          <div class="bm-inp-grp"><label>Part A</label><input type="number" id="pwA" value="35" min="1" oninput="bmDrawPW()"></div>
          <div class="bm-inp-grp"><label>Part B</label><input type="number" id="pwB" value="48" min="1" oninput="bmDrawPW()"></div>
        </div>
        <div class="bm-canvas-wrap"><canvas id="pwCanvas" width="480" height="90"></canvas></div>
        <div class="bm-result" id="pwResult">Total = 35 + 48 = <span>83</span></div>
      </div>
    </div>
  </div>

  <!-- COMPARISON -->
  <div class="bm-subsec" id="bm3">
    <div class="concept-box">
      <h3>⚖️ Comparison Model</h3>
      <p>Use this when comparing <strong>two or more quantities</strong> to find the difference or a relationship.</p>
      <div class="formula-box" style="text-align:center">Larger − Smaller = Difference<br>Smaller = Larger − Difference<br>Larger = Smaller + Difference</div>
    </div>
    <div class="concept-box">
      <h3>Example 1 — Simple Comparison</h3>
      <p>Ali has $240. Bala has $60 less than Ali. How much does Bala have?</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">Ali</div>
          <div class="bm-bar" style="width:360px"><div class="bm-seg" style="width:100%;background:#e11d48"><span>$240</span></div></div>
        </div>
        <div class="bm-bar-row">
          <div class="bm-label">Bala</div>
          <div class="bm-bar" style="width:270px"><div class="bm-seg" style="width:100%;background:#6C63FF"><span>?</span></div></div>
          <div style="display:flex;align-items:center;height:44px;padding:0 6px;background:#ffe4e6;border-radius:6px;font-size:.78rem;font-weight:700;color:#e11d48">$60 more</div>
        </div>
      </div>
      <div class="bm-step">Bala = $240 − $60 = <strong>$180</strong></div>
    </div>
    <div class="concept-box">
      <h3>Example 2 — Find the Total</h3>
      <p>Saina collected 3 times as many stickers as Mia. Mia collected 45 stickers. How many did they collect altogether?</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">Mia</div>
          <div class="bm-bar" style="width:120px"><div class="bm-seg" style="width:100%;background:#6C63FF"><span>45</span></div></div>
        </div>
        <div class="bm-bar-row">
          <div class="bm-label">Saina</div>
          <div class="bm-bar" style="width:360px">
            <div class="bm-seg" style="width:33.3%;background:#e11d48"><span>45</span></div>
            <div class="bm-seg" style="width:33.3%;background:#e11d48"><span>45</span></div>
            <div class="bm-seg" style="width:33.3%;background:#e11d48"><span>45</span></div>
          </div>
        </div>
      </div>
      <div class="bm-step">Saina = 3 × 45 = 135<br>Total = 45 + 135 = <strong>180 stickers</strong></div>
    </div>
    <div class="concept-box">
      <h3>Example 3 — Find Both Quantities</h3>
      <p>Sam and Jay share 96 cards. Sam has 16 more than Jay. How many does each have?</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">Sam</div>
          <div class="bm-bar" style="width:300px"><div class="bm-seg" style="width:100%;background:#e11d48"><span>? + 16 extra</span></div></div>
        </div>
        <div class="bm-bar-row">
          <div class="bm-label">Jay</div>
          <div class="bm-bar" style="width:240px"><div class="bm-seg" style="width:100%;background:#6C63FF"><span>?</span></div></div>
        </div>
      </div>
      <div class="bm-step">Jay's share: (96 − 16) ÷ 2 = 80 ÷ 2 = <strong>40</strong><br>Sam's share: 40 + 16 = <strong>56</strong></div>
      <div class="bm-tip">💡 Remove the difference from the total first, then split equally!</div>
    </div>
  </div>

  <!-- FRACTIONS -->
  <div class="bm-subsec" id="bm4">
    <div class="concept-box">
      <h3>🍕 Fraction Bar Models</h3>
      <p>Bar models are perfect for fractions! Divide the bar into <strong>equal units</strong> based on the denominator.</p>
      <div class="formula-box" style="text-align:center">1 unit = Whole ÷ Denominator<br>Fraction of whole = Numerator × 1 unit</div>
    </div>
    <div class="concept-box">
      <h3>Example 1 — Fraction of a Set</h3>
      <p>There are 40 pupils. ¾ of them are girls. How many girls are there?</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">40 pupils</div>
          <div class="bm-bar" style="width:360px">
            <div class="bm-seg" style="width:25%;background:#e11d48"><span>10</span></div>
            <div class="bm-seg" style="width:25%;background:#e11d48"><span>10</span></div>
            <div class="bm-seg" style="width:25%;background:#e11d48"><span>10</span></div>
            <div class="bm-seg" style="width:25%;background:#d4d4d8"><span>10</span></div>
          </div>
        </div>
        <div style="font-size:.82rem;color:#888;padding-left:76px;margin-top:2px">← ¾ girls = 30 →&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;¼ boys = 10</div>
      </div>
      <div class="bm-step">1 unit = 40 ÷ 4 = 10<br>Girls = 3 units = 3 × 10 = <strong>30 girls</strong></div>
    </div>
    <div class="concept-box">
      <h3>Example 2 — Remainder Problem</h3>
      <p>Sam spent ⅓ of his money on a book and ½ of the remainder on food. He had $20 left. How much did he start with?</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">Start</div>
          <div class="bm-bar" style="width:360px">
            <div class="bm-seg" style="width:33.3%;background:#e11d48"><span>Book ⅓</span></div>
            <div class="bm-seg" style="width:33.3%;background:#FF9F43"><span>Food</span></div>
            <div class="bm-seg" style="width:33.3%;background:#43D8A0"><span>$20 left</span></div>
          </div>
        </div>
      </div>
      <div class="bm-step">After book: ⅔ remains. Food = ½ of ⅔ = ⅓. Left = ⅓ = $20<br>Start = 3 × $20 = <strong>$60</strong></div>
    </div>
    <div class="concept-box">
      <h3>Example 3 — Finding the Whole from a Part</h3>
      <p>⅖ of a number is 24. Find the number.</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">?</div>
          <div class="bm-bar" style="width:360px">
            <div class="bm-seg" style="width:20%;background:#e11d48"><span>12</span></div>
            <div class="bm-seg" style="width:20%;background:#e11d48"><span>12</span></div>
            <div class="bm-seg" style="width:20%;background:#d4d4d8"><span>12</span></div>
            <div class="bm-seg" style="width:20%;background:#d4d4d8"><span>12</span></div>
            <div class="bm-seg" style="width:20%;background:#d4d4d8"><span>12</span></div>
          </div>
        </div>
        <div style="font-size:.82rem;color:#888;padding-left:24px;margin-top:2px">← 2 units = 24 →</div>
      </div>
      <div class="bm-step">2 units = 24, so 1 unit = 12<br>Whole (5 units) = 5 × 12 = <strong>60</strong></div>
    </div>
  </div>

  <!-- PERCENTAGE -->
  <div class="bm-subsec" id="bm5">
    <div class="concept-box">
      <h3>💯 Percentage Bar Models</h3>
      <p>The whole bar always = <strong>100%</strong>. Divide it into 100 equal parts, then group them.</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">100%</div>
          <div class="bm-bar" style="width:380px">
            <div class="bm-seg" style="width:30%;background:#e11d48"><span>30%</span></div>
            <div class="bm-seg" style="width:70%;background:#6C63FF"><span>70%</span></div>
          </div>
        </div>
      </div>
    </div>
    <div class="concept-box">
      <h3>Example 1 — Find the Percentage Amount</h3>
      <p>30% of 240 pupils play football. How many is that?</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">240 (100%)</div>
          <div class="bm-bar" style="width:360px">
            <div class="bm-seg" style="width:30%;background:#e11d48"><span>30% = ?</span></div>
            <div class="bm-seg" style="width:70%;background:#d4d4d8"><span>70%</span></div>
          </div>
        </div>
      </div>
      <div class="bm-step">1% = 240 ÷ 100 = 2.4<br>30% = 30 × 2.4 = <strong>72 pupils</strong></div>
    </div>
    <div class="concept-box">
      <h3>Example 2 — Reverse Percentage</h3>
      <p>After a 20% discount, a bag costs $56. What was the original price?</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">Original (100%)</div>
          <div class="bm-bar" style="width:380px">
            <div class="bm-seg" style="width:80%;background:#43D8A0"><span>After discount = 80% = $56</span></div>
            <div class="bm-seg" style="width:20%;background:#e11d48"><span>20% off</span></div>
          </div>
        </div>
      </div>
      <div class="bm-step">80% = $56 → 1% = $56 ÷ 80 = $0.70<br>100% = $0.70 × 100 = <strong>$70</strong></div>
    </div>
    <div class="concept-box">
      <h3>Example 3 — Percentage Increase</h3>
      <p>A price increased by 15% to $92. Find the original price.</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">Original (100%)</div>
          <div class="bm-bar" style="width:350px"><div class="bm-seg" style="width:100%;background:#6C63FF"><span>100%</span></div></div>
        </div>
        <div class="bm-bar-row">
          <div class="bm-label">New (115%)</div>
          <div class="bm-bar" style="width:403px">
            <div class="bm-seg" style="width:87%;background:#6C63FF"><span>100%</span></div>
            <div class="bm-seg" style="width:13%;background:#FF9F43"><span>+15%</span></div>
          </div>
        </div>
      </div>
      <div class="bm-step">115% = $92 → 1% = $92 ÷ 115 = $0.80<br>100% = $0.80 × 100 = <strong>$80</strong></div>
    </div>
  </div>

  <!-- BEFORE-AFTER -->
  <div class="bm-subsec" id="bm6">
    <div class="concept-box">
      <h3>🔄 Before-After Model</h3>
      <p>Use this when a quantity <strong>changes</strong> — something is given away, received, spent or earned. Draw a bar for BEFORE and another for AFTER.</p>
      <div class="bm-key">📌 Key: The change is shown by the difference in bar length, and the relationship between Before and After.</div>
    </div>
    <div class="concept-box">
      <h3>Example 1 — Spending</h3>
      <p>Tom had some money. He spent $35 and had $65 left. How much did he have at first?</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">Before</div>
          <div class="bm-bar" style="width:360px">
            <div class="bm-seg" style="width:64%;background:#6C63FF"><span>$65 left</span></div>
            <div class="bm-seg" style="width:36%;background:#e11d48"><span>$35 spent</span></div>
          </div>
          <div style="font-size:.82rem;color:#6C63FF;font-weight:700;margin-left:8px">= ?</div>
        </div>
        <div class="bm-bar-row">
          <div class="bm-label">After</div>
          <div class="bm-bar" style="width:230px"><div class="bm-seg" style="width:100%;background:#43D8A0"><span>$65</span></div></div>
        </div>
      </div>
      <div class="bm-step">Before = $65 + $35 = <strong>$100</strong></div>
    </div>
    <div class="concept-box">
      <h3>Example 2 — Giving and Receiving</h3>
      <p>Amy gave 30 stickers to Ben. Now they have the same number. Amy had 80 stickers before. How many did Ben have before?</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">Amy Before</div>
          <div class="bm-bar" style="width:320px">
            <div class="bm-seg" style="width:81%;background:#e11d48"><span>kept</span></div>
            <div class="bm-seg" style="width:19%;background:#FF9F43"><span>gave 30</span></div>
          </div>
        </div>
        <div class="bm-bar-row">
          <div class="bm-label">Ben Before</div>
          <div class="bm-bar" style="width:200px"><div class="bm-seg" style="width:100%;background:#6C63FF"><span>?</span></div></div>
        </div>
      </div>
      <div class="bm-step">Amy after = 80 − 30 = 50 (same as Ben after)<br>Ben before = 50 − 30 = <strong>20 stickers</strong></div>
      <div class="bm-tip">💡 After giving: Amy = Ben = 50. Ben RECEIVED 30, so before = 50 − 30 = 20</div>
    </div>
    <div class="concept-box">
      <h3>Example 3 — Ratio Changes</h3>
      <p>A jar had red and blue balls in ratio 3:1. After removing 12 red balls, the ratio became 1:1. How many balls were there at first?</p>
      <div class="bm-bar-wrap">
        <div class="bm-bar-row">
          <div class="bm-label">Before Red</div>
          <div class="bm-bar" style="width:360px">
            <div class="bm-seg" style="width:33%;background:#e11d48"><span>u</span></div>
            <div class="bm-seg" style="width:33%;background:#e11d48"><span>u</span></div>
            <div class="bm-seg" style="width:33%;background:#e11d48"><span>u</span></div>
          </div>
        </div>
        <div class="bm-bar-row">
          <div class="bm-label">Blue (same)</div>
          <div class="bm-bar" style="width:120px"><div class="bm-seg" style="width:100%;background:#6C63FF"><span>u</span></div></div>
        </div>
      </div>
      <div class="bm-step">After removing 12 red, red = blue → removed 2 units = 12 → 1 unit = 6<br>Total before = 4 units = 4 × 6 = <strong>24 balls</strong></div>
    </div>
  </div>

            <div class="bm-seg" style="width:20%;background:#e11d48"><span>u</span></div>

    percentage: {
      title: '💯 Percentage Pop!',
      desc: 'Find the percentage and click the correct balloon!',
      generateQ: () => {
        const pcts = [10,20,25,30,40,50,75];
        const p = pcts[Math.floor(Math.random()*pcts.length)];
        const wholes = [40,60,80,100,120,200,400];
        const w = wholes[Math.floor(Math.random()*wholes.length)];
        const ans = p*w/100;
        return {
          question: `${p}% of ${w} = ?`,
          answer: ans,
          getWrong: (a) => [a+10, a-10, a*2].filter(x=>x!==a && x>0).slice(0,3)
        };
      }
    }
  };
  return configs[topicId];
}

function buildHome() {

      <h3>${t.title}</h3>
      <p>${t.desc}</p>

function buildPracticeTab(id) {
  practiceLevel = 'easy';
  practiceQIndex = 0;
  practiceAnswered = [];
  renderPractice(id);
}

function renderPractice(id) {
  const questions = practiceQuestions[id][practiceLevel] || [];
  practiceAnswered = new Array(questions.length).fill(null);
  const tab = document.getElementById('practiceTab');
  tab.innerHTML = `
    <div class="practice-intro">Answer questions to earn stars! More stars for harder levels 🌟</div>
    <div class="level-selector">
      <button class="level-btn easy ${practiceLevel==='easy'?'active':''}" onclick="setLevel('easy','${id}')">🟢 Basic</button>
      <button class="level-btn medium ${practiceLevel==='medium'?'active':''}" onclick="setLevel('medium','${id}')">🟡 Medium</button>
      <button class="level-btn hard ${practiceLevel==='hard'?'active':''}" onclick="setLevel('hard','${id}')">🔴 Hard</button>
    </div>
    <div id="practiceQWrap"></div>`;
  renderPracticeQ(id);
}

function setLevel(level, id) {
  practiceLevel = level;
  practiceQIndex = 0;
  renderPractice(id);
}

function renderPracticeQ(id) {
  const questions = practiceQuestions[id][practiceLevel] || [];
  if (!questions.length) { document.getElementById('practiceQWrap').innerHTML = '<p style="text-align:center;color:#999">Questions for this level coming soon!</p>'; return; }
  const q = questions[practiceQIndex];
  const dots = questions.map((_, i) => {
    let cls = 'q-dot';
    if (i === practiceQIndex) cls += ' current';
    else if (practiceAnswered[i] === true) cls += ' done';
    else if (practiceAnswered[i] === false) cls += ' wrong';
    return `<div class="${cls}"></div>`;
  }).join('');

  document.getElementById('practiceQWrap').innerHTML = `
    <div class="question-card">
      <div class="q-number">Question ${practiceQIndex+1} of ${questions.length}</div>
      <div class="q-text">${q.q}</div>
      ${q.type==='number'||q.type==='text' ? `
        <div class="answer-row">
          <input class="answer-input" id="practiceInput" type="${q.type==='number'?'number':'text'}" placeholder="Your answer…" onkeydown="if(event.key==='Enter')checkPractice('${id}')">
          <button class="btn-primary" onclick="checkPractice('${id}')">Check ✓</button>
          <button class="btn-hint" onclick="showHint()">💡 Hint</button>
        </div>` : ''}
      <div class="hint-box" id="hintBox">${q.hint}</div>
      <div class="feedback-box" id="feedbackBox"></div>
      <div class="q-nav">
        <button class="btn-secondary" onclick="navPractice(${practiceQIndex-1},'${id}')" ${practiceQIndex===0?'disabled':''}>← Prev</button>
        <div class="q-dots">${dots}</div>
        <button class="btn-secondary" onclick="navPractice(${practiceQIndex+1},'${id}')" ${practiceQIndex===questions.length-1?'disabled':''}>Next →</button>
      </div>
    </div>`;
}

function showHint() {
  const hintBox = document.getElementById('hintBox');
  hintBox.classList.toggle('show');
}

function checkPractice(id) {
  const questions = practiceQuestions[id][practiceLevel];
  const q = questions[practiceQIndex];
  const input = document.getElementById('practiceInput');
  const val = input.value.trim().toLowerCase().replace(/\s+/g,' ');
  let correct = false;
  if (q.type === 'number') {
    correct = Math.abs(parseFloat(val) - q.a) < 0.01;
  } else {
    correct = val === String(q.a).toLowerCase() || val.includes(String(q.a).toLowerCase());
  }
  practiceAnswered[practiceQIndex] = correct;
  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box ' + (correct ? 'correct' : 'wrong');
  fb.style.display = 'block';
  fb.textContent = correct ? `🎉 Excellent! That's right!` : `Not quite! The answer is ${q.a}. Read the hint for help! 💡`;
  input.className = 'answer-input ' + (correct ? 'correct' : 'wrong');
  if (correct) {
    const pts = practiceLevel==='easy' ? 1 : practiceLevel==='medium' ? 2 : 3;
    awardStars(pts);
    showFloatScore('+'+pts+'⭐');
  }
  // Update progress
  const done = practiceAnswered.filter(x=>x===true).length;
  if (!progress[id]) progress[id] = {};
  progress[id].practiceScore = Math.round(done/questions.length*100);
  saveProgress();
  // Re-render dots
  const dotsEl = document.querySelector('.q-dots');
  if (dotsEl) dotsEl.innerHTML = questions.map((_, i) => {
    let cls = 'q-dot';
    if (i === practiceQIndex) cls += ' current';
    else if (practiceAnswered[i] === true) cls += ' done';
    else if (practiceAnswered[i] === false) cls += ' wrong';
    return `<div class="${cls}"></div>`;
  }).join('');
}

function navPractice(idx, id) {
  const questions = practiceQuestions[id][practiceLevel];
  if (idx < 0 || idx >= questions.length) return;
  practiceQIndex = idx;
  renderPracticeQ(id);
}

function buildQuizTab(id) {
  quizStarted = false;
  quizScore = 0;
  quizQIndex = 0;
  quizAnswered = [];
  if (quizTimer) clearInterval(quizTimer);
  const qs = quizQuestions[id] || [];
  document.getElementById('quizTab').innerHTML = `
    <div class="quiz-start">
      <h3>⏱️ Speed Quiz!</h3>
      <p>Answer ${qs.length} questions as fast as you can! Each correct answer = ⭐</p>
      <div class="quiz-stats">
        <div class="stat-box"><div class="stat-num">${qs.length}</div><div class="stat-label">QUESTIONS</div></div>
        <div class="stat-box"><div class="stat-num">30s</div><div class="stat-label">PER QUESTION</div></div>
        <div class="stat-box"><div class="stat-num">⭐</div><div class="stat-label">PER CORRECT</div></div>
      </div>
      <button class="btn-primary" style="font-size:1.1rem;padding:14px 32px" onclick="startQuiz('${id}')">🚀 Start Quiz!</button>
    </div>`;
}

function startQuiz(id) {
  quizStarted = true;
  quizQIndex = 0;
  quizScore = 0;
  quizAnswered = [];
  renderQuizQ(id);
}

function renderQuizQ(id) {
  const qs = quizQuestions[id];
  if (quizQIndex >= qs.length) { showQuizResults(id); return; }
  if (quizTimer) clearInterval(quizTimer);
  quizTimeLeft = 30;
  const q = qs[quizQIndex];
  document.getElementById('quizTab').innerHTML = `
    <div class="question-card">
      <div class="q-number">Question ${quizQIndex+1} of ${qs.length} &nbsp;|&nbsp; Score: ${quizScore}/${quizQIndex}</div>
      <div class="timer-label">⏱ ${quizTimeLeft}s remaining</div>
      <div class="timer-bar"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
      <div class="q-text">${q.q}</div>
      <div class="mcq-options" id="mcqOpts">
        ${q.opts.map((o,i) => `<div class="mcq-opt" onclick="answerQuiz(${i},'${id}')">${String.fromCharCode(65+i)}) ${o}</div>`).join('')}
      </div>
      <div class="feedback-box" id="quizFeedback"></div>
    </div>`;
  quizTimer = setInterval(() => {
    quizTimeLeft--;
    const fill = document.getElementById('timerFill');
    const lbl = document.querySelector('.timer-label');
    if (fill) fill.style.width = (quizTimeLeft/30*100)+'%';
    if (lbl) lbl.textContent = `⏱ ${quizTimeLeft}s remaining`;
    if (fill) fill.style.background = quizTimeLeft <= 10 ? 'linear-gradient(90deg,#FF6584,#f97316)' : 'linear-gradient(90deg,#43D8A0,#6C63FF)';
    if (quizTimeLeft <= 0) {
      clearInterval(quizTimer);
      answerQuiz(-1, id);
    }
  }, 1000);
}

function answerQuiz(chosen, id) {
  clearInterval(quizTimer);
  const qs = quizQuestions[id];
  const q = qs[quizQIndex];
  const correct = chosen === q.a;
  quizAnswered.push(correct);
  if (correct) quizScore++;
  const opts = document.querySelectorAll('.mcq-opt');
  opts.forEach((el, i) => {
    el.style.pointerEvents = 'none';
    if (i === q.a) el.classList.add('correct-ans');
    else if (i === chosen && !correct) el.classList.add('wrong-ans');
  });
  const fb = document.getElementById('quizFeedback');
  if (fb) {
    fb.className = 'feedback-box ' + (correct ? 'correct' : 'wrong');
    fb.style.display = 'block';
    fb.textContent = correct ? `✅ Correct! Well done!` : (chosen===-1 ? `⏰ Time's up! Answer: ${q.opts[q.a]}` : `❌ Oops! Correct answer: ${q.opts[q.a]}`);
  }
  if (correct) showFloatScore('+1⭐');
  setTimeout(() => { quizQIndex++; renderQuizQ(id); }, 1800);
}

function showQuizResults(id) {
  const total = quizQuestions[id].length;
  const pct = Math.round(quizScore/total*100);
  const starsEarned = quizScore >= total ? 5 : quizScore >= Math.ceil(total*0.8) ? 4 : quizScore >= Math.ceil(total*0.6) ? 3 : quizScore >= Math.ceil(total*0.4) ? 2 : 1;
  const msg = pct===100 ? 'PERFECT! You are a Math Superstar! 🏆' : pct>=80 ? 'Amazing work! Keep it up! 🌟' : pct>=60 ? 'Good job! Practice more to improve! 💪' : 'Keep trying! You can do it! 🌈';
  awardStars(starsEarned);
  if (!progress[id]) progress[id] = {};
  progress[id].quizScore = Math.max(progress[id].quizScore || 0, pct);
  progress[id].stars = (progress[id].stars || 0) + starsEarned;
  saveProgress();
  launchConfetti();
  document.getElementById('quizTab').innerHTML = `
    <div class="results-screen">
      <div class="trophy">${pct===100?'🏆':pct>=80?'🥇':pct>=60?'🥈':'🥉'}</div>
      <div class="score-circle"><div class="score-num">${quizScore}</div><div class="score-denom">out of ${total}</div></div>
      <h3>${msg}</h3>
      <p>${pct}% correct</p>
      <div class="star-reward">${'⭐'.repeat(starsEarned)}</div>
      <div class="btn-row" style="justify-content:center;margin-top:20px">
        <button class="btn-primary" onclick="buildQuizTab('${id}');switchTab('quiz')">🔁 Try Again</button>
        <button class="btn-secondary" onclick="switchTab('practice')">✏️ Practice More</button>
      </div>
    </div>`;
}

//  GAME TAB
// ============================================================
let gameInterval = null;
let gameBalloons = [];
let currentGameQ = null;

function buildGameTab(id) {
  gameScore = 0;
  gameLives = 3;
  const cfg = getGameConfig(id);
  document.getElementById('gameTab').innerHTML = `
    <div class="game-container">
      <h3>${cfg.title}</h3>
      <p>${cfg.desc}</p>
      <div class="game-score">Score: <span id="gScore">0</span> &nbsp; <span class="game-lives" id="gLives">❤️❤️❤️</span></div>
      <div class="game-q" id="gameQ">Press Start to play!</div>
      <div class="balloon-area" id="balloonArea"></div>
      <button class="btn-primary" id="gameStartBtn" onclick="startGame('${id}')" style="margin:0 auto;display:block">🚀 Start Game!</button>
    </div>`;
}

function startGame(id) {
  gameScore = 0;
  gameLives = 3;
  document.getElementById('gScore').textContent = 0;
  document.getElementById('gLives').textContent = '❤️❤️❤️';
  document.getElementById('gameStartBtn').style.display = 'none';
  nextGameQ(id);
}

const balloonEmojis = ['🎈','🎀','🎊','🎁','⭐','🌟','💫','🔵','🟣','🟡'];

function nextGameQ(id) {
  if (gameInterval) clearInterval(gameInterval);
  const cfg = getGameConfig(id);
  const qData = cfg.generateQ();
  currentGameQ = qData;
  document.getElementById('gameQ').textContent = qData.question;
  const area = document.getElementById('balloonArea');
  if (!area) return;
  area.innerHTML = '';
  gameBalloons = [];
  const wrongAnswers = qData.getWrong(qData.answer);
  const answers = [qData.answer, ...wrongAnswers].sort(() => Math.random()-0.5).slice(0,4);
  answers.forEach((ans, i) => {
    const b = document.createElement('div');
    b.className = 'balloon';
    b.style.left = (10 + i*22) + '%';
    b.style.bottom = (Math.random()*40+20) + 'px';
    b.innerHTML = `${balloonEmojis[Math.floor(Math.random()*balloonEmojis.length)]}<div class="balloon-label">${ans}</div>`;
    b.onclick = () => hitBalloon(ans === qData.answer, id, b);
    area.appendChild(b);
    gameBalloons.push(b);
    // animate float
    let y = parseInt(b.style.bottom);
    let dir = 1;
    const interval = setInterval(() => {
      y += dir * 0.5;
      if (y > 80) dir = -1;
      if (y < 10) dir = 1;
      if (b.parentNode) b.style.bottom = y + 'px';
      else clearInterval(interval);
    }, 50);
  });
}

function hitBalloon(correct, id, el) {
  if (!document.getElementById('balloonArea')) return;
  if (correct) {
    el.textContent = '💥';
    el.style.transform = 'scale(1.5)';
    gameScore++;
    document.getElementById('gScore').textContent = gameScore;
    awardStars(1);
    showFloatScore('+1⭐');
    setTimeout(() => nextGameQ(id), 700);
  } else {
    el.style.animation = 'shake 0.3s';
    gameLives--;
    const lives = document.getElementById('gLives');
    if (lives) lives.textContent = '❤️'.repeat(Math.max(0,gameLives));
    if (gameLives <= 0) {
      setTimeout(() => endGame(id), 300);
    }
  }
}

function endGame(id) {
  const area = document.getElementById('balloonArea');
  if (area) area.innerHTML = '<div style="text-align:center;padding-top:60px;font-size:2rem">Game Over! 💫</div>';
  const qEl = document.getElementById('gameQ');
  if (qEl) qEl.textContent = `Final Score: ${gameScore} 🏆`;
  const btn = document.getElementById('gameStartBtn');
  if (btn) { btn.style.display = 'block'; btn.textContent = '🔁 Play Again!'; btn.onclick = () => startGame(id); }
  if (!progress[id]) progress[id] = {};
  progress[id].stars = (progress[id].stars || 0) + Math.floor(gameScore/3);
  saveProgress();
}

// ============================================================
//  TRIANGLE INTERACTIVE FUNCTIONS
// ============================================================
function triSub(id, el) {
  document.querySelectorAll('.tri-subsec').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.tri-subtab').forEach(function(t) { t.classList.remove('active'); });
  var sec = document.getElementById(id);
  if (sec) sec.classList.add('active');
  if (el) el.classList.add('active');
  if (id === 'ts4') setTimeout(triInitExplorer, 80);
  if (id === 'ts7') setTimeout(triDrawGrid, 80);
  if (id === 'ts10') setTimeout(triUpdateArea, 80);
}
function triInitExplorer() { triUpdateExplorer(); }
function triUpdateExplorer() {
  var aEl = document.getElementById('angA');
  var bEl = document.getElementById('angB');
  var cEl = document.getElementById('angC');
  var sumEl = document.getElementById('triAngleSum');
  if (!aEl || !bEl || !cEl || !sumEl) return;
  var a = parseFloat(aEl.value) || 0;
  var b = parseFloat(bEl.value) || 0;
  var c = 180 - a - b;
  cEl.value = c > 0 ? c : '-';
  if (c > 0 && a > 0 && b > 0) {
    sumEl.innerHTML = a + '° + ' + b + '° + ' + c + '° = <span style="color:#43D8A0">180°</span>';
    triDrawAngle(a, b, c);
  } else {
    sumEl.innerHTML = '<span style="color:#FF6584">Invalid — angles must sum to 180°</span>';
    var cv = document.getElementById('triCanvas');
    if (cv) cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
  }
}
function triDrawAngle(A, B, C) {
  var cv = document.getElementById('triCanvas');
  if (!cv) return;
  var ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  var rad = function(d) { return d * Math.PI / 180; };
  var bl = 200, Bx = 90, By = 230, Cx = Bx + bl, Cy = By;
  var AB = bl * Math.sin(rad(C)) / Math.sin(rad(A));
  var Ax = Bx + AB * Math.cos(rad(B)), Ay = By - AB * Math.sin(rad(B));
  ctx.beginPath(); ctx.moveTo(Ax, Ay); ctx.lineTo(Bx, By); ctx.lineTo(Cx, Cy); ctx.closePath();
  ctx.fillStyle = '#e0e7ff'; ctx.fill();
  ctx.strokeStyle = '#6C63FF'; ctx.lineWidth = 3; ctx.lineJoin = 'round'; ctx.stroke();
  ctx.font = '700 13px sans-serif'; ctx.textAlign = 'center';
  ctx.fillStyle = '#FF6584'; ctx.fillText('A (' + A + '°)', Ax, Math.max(Ay - 12, 18));
  ctx.fillStyle = '#2D3748';
  ctx.fillText('B (' + B + '°)', Bx - 5, By + 20);
  ctx.fillText('C (' + C + '°)', Cx + 5, Cy + 20);
}
function triDrawGrid() {
  var cv = document.getElementById('gridCanvas');
  if (!cv) return;
  var ctx = cv.getContext('2d'), u = 36, cols = 8, rows = 6, ox = 20, oy = 10;
  ctx.clearRect(0, 0, cv.width, cv.height);
  ctx.strokeStyle = '#E0DCE8'; ctx.lineWidth = 1;
  for (var i = 0; i <= cols; i++) { ctx.beginPath(); ctx.moveTo(ox+i*u, oy); ctx.lineTo(ox+i*u, oy+rows*u); ctx.stroke(); }
  for (var j = 0; j <= rows; j++) { ctx.beginPath(); ctx.moveTo(ox, oy+j*u); ctx.lineTo(ox+cols*u, oy+j*u); ctx.stroke(); }
  var bx = ox + u, by2 = oy + rows * u, cx2 = bx + 6*u, ax = bx + 2*u, ay = oy + u;
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by2); ctx.lineTo(cx2, by2); ctx.closePath();
  ctx.fillStyle = 'rgba(108,99,255,.18)'; ctx.fill();
  ctx.strokeStyle = '#6C63FF'; ctx.lineWidth = 2.5; ctx.stroke();
  ctx.setLineDash([5,3]);
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ax, by2);
  ctx.strokeStyle = '#FF6584'; ctx.lineWidth = 2; ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeRect(ax, by2-9, 8, 8);
  ctx.font = '700 11px sans-serif'; ctx.fillStyle = '#6C63FF'; ctx.textAlign = 'center';
  ctx.fillText('base = 6 cm', ox + 4*u, by2 + 20);
  ctx.fillStyle = '#FF6584'; ctx.textAlign = 'left';
  ctx.fillText('h=5', ax + 4, ay + (by2-ay)/2);
}
function triUpdateArea() {
  var bEl = document.getElementById('areaBase');
  var hEl = document.getElementById('areaHeight');
  var res = document.getElementById('triAreaResult');
  if (!bEl || !hEl || !res) return;
  var b = parseFloat(bEl.value) || 0;
  var h = parseFloat(hEl.value) || 0;
  if (b > 0 && h > 0) {
    res.innerHTML = 'Area = ½ × ' + b + ' × ' + h + ' = <span>' + (b*h/2) + ' cm²</span>';
    triDrawAreaCalc(b, h);
  }
}
function triDrawAreaCalc(base, height) {
  var cv = document.getElementById('areaCanvas');
  if (!cv) return;
  var ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  var scale = Math.min(280/base, 150/height);
  var w = base * scale, h = height * scale;
  var sx = (cv.width - w) / 2, by = 20 + h;
  ctx.beginPath(); ctx.moveTo(sx+w/2, 20); ctx.lineTo(sx, by); ctx.lineTo(sx+w, by); ctx.closePath();
  ctx.fillStyle = '#e0e7ff'; ctx.fill();
  ctx.strokeStyle = '#6C63FF'; ctx.lineWidth = 3; ctx.lineJoin = 'round'; ctx.stroke();
  ctx.setLineDash([6,4]);
  ctx.beginPath(); ctx.moveTo(sx+w/2, 20); ctx.lineTo(sx+w/2, by);
  ctx.strokeStyle = '#FF6584'; ctx.lineWidth = 2; ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeRect(sx+w/2, by-10, 10, 10);
  ctx.font = '700 13px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = '#6C63FF';
  ctx.fillText(base + ' cm', sx + w/2, by + 22);
  ctx.fillStyle = '#FF6584'; ctx.textAlign = 'left';
  ctx.fillText(height + ' cm', sx+w/2+14, (20+by)/2+5);
}

// ============================================================
//  BAR MODEL INTERACTIVE FUNCTIONS
// ============================================================
function bmSub(id, el) {
  document.querySelectorAll('.bm-subsec').forEach(function(s){ s.classList.remove('active'); });
  document.querySelectorAll('.bm-subtab').forEach(function(t){ t.classList.remove('active'); });
  var sec = document.getElementById(id);
  if (sec) sec.classList.add('active');
  if (el) el.classList.add('active');
  if (id === 'bm2') setTimeout(bmDrawPW, 80);
  if (id === 'bm7') setTimeout(function(){ bmBuild(); bmCompare(); }, 80);
}

function bmDrawPW() {
  var aEl = document.getElementById('pwA');
  var bEl = document.getElementById('pwB');
  var cv = document.getElementById('pwCanvas');
  var res = document.getElementById('pwResult');
  if (!aEl || !bEl || !cv || !res) return;
  var a = parseFloat(aEl.value) || 0;
  var b = parseFloat(bEl.value) || 0;
  var total = a + b;
  if (total <= 0) return;
  var ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width - 100, ox = 80, oy = 20, H = 50;
  var wA = (a / total) * W;
  // Part A
  ctx.fillStyle = '#e11d48'; ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(ox, oy, wA, H, [8,0,0,8]) : ctx.rect(ox, oy, wA, H);
  ctx.fill();
  // Part B
  ctx.fillStyle = '#6C63FF'; ctx.beginPath();
  ctx.roundRect ? ctx.roundRect(ox+wA, oy, W-wA, H, [0,8,8,0]) : ctx.rect(ox+wA, oy, W-wA, H);
  ctx.fill();
  // Labels inside
  ctx.font = '700 14px sans-serif'; ctx.textAlign = 'center'; ctx.fillStyle = 'white';
  if (wA > 30) ctx.fillText(a, ox + wA/2, oy + H/2 + 5);
  if (W-wA > 30) ctx.fillText(b, ox + wA + (W-wA)/2, oy + H/2 + 5);
  // Left label
  ctx.fillStyle = '#2D3748'; ctx.textAlign = 'right'; ctx.font = '700 12px sans-serif';
  ctx.fillText('Total', ox - 8, oy + H/2 + 5);
  // Right label
  ctx.fillStyle = '#e11d48'; ctx.textAlign = 'left';
  ctx.fillText('= ' + total, ox + W + 8, oy + H/2 + 5);
  res.innerHTML = 'Total = ' + a + ' + ' + b + ' = <span>' + total + '</span>';
}

function bmBuild() {
  var aEl = document.getElementById('bmA');
  var bEl = document.getElementById('bmB');
  var cEl = document.getElementById('bmC');
  var cv = document.getElementById('bmCanvas');
  var res = document.getElementById('bmBuildResult');
  if (!aEl || !bEl || !cv || !res) return;
  var a = parseFloat(aEl.value) || 0;
  var b = parseFloat(bEl.value) || 0;
  var c = parseFloat(cEl.value) || 0;
  var total = a + b + c;
  if (total <= 0) return;
  var ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  var W = cv.width - 100, ox = 80, oy = 25, H = 54;
  var colors = ['#e11d48','#6C63FF','#43D8A0'];
  var parts = [a, b, c].filter(x => x > 0);
  var labels = ['Part A','Part B','Part C'].slice(0, parts.length);
  var x = ox;
  parts.forEach(function(p, i) {
    var w = (p / total) * W;
    ctx.fillStyle = colors[i];
    ctx.fillRect(x, oy, w, H);
    ctx.fillStyle = 'white'; ctx.font = '700 13px sans-serif'; ctx.textAlign = 'center';
    if (w > 30) ctx.fillText(p, x + w/2, oy + H/2 + 5);
    x += w;
  });
  // border
  ctx.strokeStyle = 'rgba(0,0,0,0.1)'; ctx.lineWidth = 1; ctx.strokeRect(ox, oy, W, H);
  ctx.fillStyle = '#2D3748'; ctx.textAlign = 'right'; ctx.font = '700 12px sans-serif';
  ctx.fillText('Total', ox - 8, oy + H/2 + 5);
  ctx.fillStyle = '#e11d48'; ctx.textAlign = 'left';
  ctx.fillText('= ' + total, ox + W + 8, oy + H/2 + 5);
  var expr = parts.join(' + ');
  res.innerHTML = 'Total = ' + expr + ' = <span>' + total + '</span>';
}

function bmCompare() {
  var lEl = document.getElementById('bmLarge');
  var sEl = document.getElementById('bmSmall');
  var cv = document.getElementById('bmCompCanvas');
  var res = document.getElementById('bmCompResult');
  if (!lEl || !sEl || !cv || !res) return;
  var large = parseFloat(lEl.value) || 0;
  var small = parseFloat(sEl.value) || 0;
  if (large <= 0 || small <= 0) return;
  var ctx = cv.getContext('2d');
  ctx.clearRect(0, 0, cv.width, cv.height);
  var maxW = cv.width - 110, ox = 90, H = 42, gap = 16;
  var lW = maxW, sW = (small / large) * maxW;
  var diffW = lW - sW;
  // Row 1 - larger
  ctx.fillStyle = '#e11d48'; ctx.fillRect(ox, 15, lW, H);
  ctx.fillStyle = 'white'; ctx.font = '700 14px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(large, ox + lW/2, 15 + H/2 + 5);
  ctx.fillStyle = '#2D3748'; ctx.textAlign = 'right'; ctx.font = '600 12px sans-serif';
  ctx.fillText('Larger', ox - 8, 15 + H/2 + 5);
  // Row 2 - smaller + difference
  ctx.fillStyle = '#6C63FF'; ctx.fillRect(ox, 15 + H + gap, sW, H);
  ctx.fillStyle = 'white'; ctx.font = '700 14px sans-serif'; ctx.textAlign = 'center';
  if (sW > 30) ctx.fillText(small, ox + sW/2, 15 + H + gap + H/2 + 5);
  // Difference box
  if (diffW > 4) {
    ctx.fillStyle = '#FFD166'; ctx.fillRect(ox + sW, 15 + H + gap, diffW, H);
    ctx.fillStyle = '#92400e'; ctx.font = '700 12px sans-serif'; ctx.textAlign = 'center';
    if (diffW > 30) ctx.fillText('diff: '+(large-small), ox + sW + diffW/2, 15 + H + gap + H/2 + 5);
  }
  ctx.fillStyle = '#2D3748'; ctx.textAlign = 'right'; ctx.font = '600 12px sans-serif';
  ctx.fillText('Smaller', ox - 8, 15 + H + gap + H/2 + 5);
  res.innerHTML = 'Difference = ' + large + ' − ' + small + ' = <span>' + (large - small) + '</span>';
}

buildHome();
