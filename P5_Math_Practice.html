<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P5 Maths Practice 🌟</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.app-header{text-align:center;color:#fff;margin-bottom:20px}
.app-header h1{font-size:2.1rem;text-shadow:2px 2px 4px rgba(0,0,0,.3)}
.app-header p{font-size:.95rem;opacity:.85;margin-top:4px}
.card{background:#fff;border-radius:20px;padding:28px;max-width:780px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.22)}
.screen{display:none}.screen.active{display:block}

/* score bar */
.score-bar{display:flex;justify-content:space-between;align-items:center;background:#f0f4ff;border-radius:12px;padding:10px 18px;margin-bottom:22px;font-size:.93rem;font-weight:600;gap:8px}
.score-bar .badge{background:#667eea;color:#fff;border-radius:20px;padding:3px 13px;font-size:.82rem}
.score-bar .stars{color:#f59e0b}

/* filter screen */
.section-title{font-size:1rem;font-weight:700;color:#374151;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chips-wrap{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:22px}
.chip{padding:9px 17px;border-radius:50px;border:2.5px solid transparent;cursor:pointer;font-size:.87rem;font-weight:600;transition:all .18s;user-select:none}
.chip:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.14)}
.chip.active{border-color:#1e1b4b!important;box-shadow:0 4px 14px rgba(0,0,0,.22);transform:translateY(-2px)}
.chip-all     {background:#f3f4f6;color:#374151}
.chip-whole   {background:#dbeafe;color:#1e40af}
.chip-fraction{background:#dcfce7;color:#166534}
.chip-word    {background:#fef9c3;color:#713f12}
.chip-geometry{background:#ffedd5;color:#9a3412}
.chip-percent {background:#fce7f3;color:#831843}
.chip-rate    {background:#ede9fe;color:#4c1d95}
.chip-measure {background:#cffafe;color:#155e75}

.marks-wrap{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:26px}
.mark-btn{padding:9px 20px;border-radius:10px;border:2.5px solid #e5e7eb;background:#f9fafb;color:#374151;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .18s}
.mark-btn:hover{border-color:#667eea;color:#667eea}
.mark-btn.active{background:#667eea;color:#fff;border-color:#667eea}
#filterCount{color:#6b7280;font-size:.88rem;margin-bottom:16px}
.btn-start{width:100%;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:14px;font-size:1.1rem;font-weight:700;cursor:pointer;transition:transform .15s,box-shadow .15s;letter-spacing:.4px}
.btn-start:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(102,126,234,.5)}

/* practice screen */
.progress-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-size:.84rem;color:#6b7280;font-weight:600}
.progress-track{background:#e5e7eb;border-radius:99px;height:8px;margin-bottom:18px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:99px;transition:width .4s}
.q-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.q-tag{font-size:.75rem;padding:3px 10px;border-radius:20px;font-weight:600}
.q-tag.concept{background:#ede9fe;color:#4c1d95}
.q-tag.school {background:#dbeafe;color:#1e40af}
.q-tag.section{background:#dcfce7;color:#166534}
.q-tag.marks  {background:#ffedd5;color:#9a3412}
.q-text{background:#f8fafc;border-left:5px solid #667eea;border-radius:0 12px 12px 0;padding:16px 18px;font-size:1.03rem;line-height:1.75;color:#1f2937;margin-bottom:18px;white-space:pre-wrap}
.options-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.opt-btn{padding:11px 14px;background:#f3f4f6;border:2.5px solid #e5e7eb;border-radius:12px;font-size:.93rem;cursor:pointer;text-align:left;transition:all .18s;font-weight:500}
.opt-btn:hover:not(:disabled){border-color:#667eea;background:#eef2ff}
.opt-btn.correct{background:#dcfce7;border-color:#16a34a;color:#166534}
.opt-btn.wrong  {background:#fee2e2;border-color:#dc2626;color:#991b1b}
.opt-btn.reveal {background:#dcfce7;border-color:#16a34a;color:#166534}
.opt-btn:disabled{cursor:default}
.ans-row{display:flex;gap:10px;margin-bottom:14px;align-items:center}
.ans-input{flex:1;padding:11px 15px;border:2.5px solid #e5e7eb;border-radius:12px;font-size:1rem;outline:none;transition:border-color .2s}
.ans-input:focus{border-color:#667eea}
.ans-input.correct{border-color:#16a34a;background:#dcfce7}
.ans-input.wrong  {border-color:#dc2626;background:#fee2e2}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.btn-check{padding:11px 22px;background:#667eea;color:#fff;border:none;border-radius:10px;font-size:.93rem;font-weight:700;cursor:pointer;transition:background .15s}
.btn-check:hover{background:#4f46e5}
.btn-show{padding:11px 20px;background:#fff;color:#6b7280;border:2px solid #d1d5db;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .15s}
.btn-show:hover{border-color:#9ca3af;color:#374151}
.btn-skip{padding:11px 20px;background:#f3f4f6;color:#6b7280;border:none;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;margin-left:auto}
.btn-skip:hover{background:#e5e7eb;color:#374151}
.feedback{border-radius:12px;padding:11px 16px;font-size:.93rem;font-weight:600;margin-bottom:12px;line-height:1.5;display:none}
.feedback.correct{background:#dcfce7;color:#166534;border:1.5px solid #86efac;display:block}
.feedback.wrong  {background:#fee2e2;color:#991b1b;border:1.5px solid #fca5a5;display:block}
.feedback.info   {background:#f0f4ff;color:#3730a3;border:1.5px solid #a5b4fc;display:block}
.solution-box{background:#fffbeb;border:1.5px solid #fcd34d;border-radius:12px;padding:13px 16px;font-size:.88rem;color:#78350f;line-height:1.65;margin-bottom:12px;display:none;white-space:pre-wrap}
.solution-box.show{display:block}
.btn-next{width:100%;padding:13px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;display:none;margin-top:4px;transition:transform .15s}
.btn-next:hover{transform:translateY(-1px)}
.btn-next.show{display:block}

/* results */
.results-wrap{text-align:center}
.results-wrap .trophy{font-size:5rem;margin-bottom:10px}
.results-wrap h2{font-size:1.75rem;color:#1f2937;margin-bottom:6px}
.results-wrap p{color:#6b7280;margin-bottom:22px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:26px}
.stat-box{background:#f8fafc;border-radius:14px;padding:16px 8px;border:1.5px solid #e5e7eb}
.stat-box .num{font-size:1.9rem;font-weight:800;color:#667eea}
.stat-box .lbl{font-size:.78rem;color:#6b7280;font-weight:600;margin-top:2px}
.btn-restart{padding:13px 34px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .15s}
.btn-restart:hover{transform:translateY(-2px)}

/* confetti */
.confetti-piece{position:fixed;top:-10px;pointer-events:none;animation:cfall 2.5s ease-in forwards}
@keyframes cfall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

@media(max-width:500px){
  .options-grid{grid-template-columns:1fr}
  .stat-grid{grid-template-columns:1fr}
  .app-header h1{font-size:1.6rem}
  .card{padding:18px}
}
</style>
</head>
<body>

<div class="app-header">
  <h1>🌟 P5 Maths Practice</h1>
  <p>2024 · Singapore Primary 5 · 89 Questions</p>
</div>

<div class="card">
  <div class="score-bar" id="scoreBar" style="display:none">
    <span>Score: <span id="scoreLbl">0 / 0</span></span>
    <span class="stars" id="starsLbl">⭐</span>
    <span class="badge" id="conceptBadge">All Topics</span>
  </div>

  <!-- ── FILTER SCREEN ─────────────────────────────────────── -->
  <div class="screen active" id="filterScreen">
    <div class="section-title">📚 Choose a Topic</div>
    <div class="chips-wrap" id="conceptChips">
      <div class="chip chip-all active"  data-c="All">All Topics</div>
      <div class="chip chip-whole"       data-c="Whole Numbers">Whole Numbers</div>
      <div class="chip chip-fraction"    data-c="Fractions">Fractions</div>
      <div class="chip chip-word"        data-c="Word Problems">Word Problems</div>
      <div class="chip chip-geometry"    data-c="Geometry">Geometry</div>
      <div class="chip chip-percent"     data-c="Percentage">Percentage</div>
      <div class="chip chip-rate"        data-c="Rate">Rate</div>
      <div class="chip chip-measure"     data-c="Measurement">Measurement</div>
    </div>
    <div class="section-title">🏅 Choose Marks</div>
    <div class="marks-wrap" id="marksChips">
      <button class="mark-btn active" data-m="0">All Marks</button>
      <button class="mark-btn" data-m="1">1 Mark</button>
      <button class="mark-btn" data-m="2">2 Marks</button>
      <button class="mark-btn" data-m="3">3 Marks</button>
      <button class="mark-btn" data-m="4">4 Marks</button>
    </div>
    <div id="filterCount"></div>
    <button class="btn-start" id="btnStart">🚀 Start Practice!</button>
  </div>

  <!-- ── PRACTICE SCREEN ───────────────────────────────────── -->
  <div class="screen" id="practiceScreen">
    <div class="progress-row">
      <span id="qCounter">Q 1 of 10</span>
      <span id="qMarkLabel" style="color:#f59e0b;font-weight:700"></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
    <div class="q-meta" id="qMeta"></div>
    <div class="q-text" id="qText"></div>
    <div class="options-grid" id="optGrid" style="display:none"></div>
    <div class="ans-row" id="ansRow" style="display:none">
      <input class="ans-input" id="ansInput" type="text" placeholder="Type your answer here…">
      <button class="btn-check" id="btnCheck">Check ✓</button>
    </div>
    <div class="btn-row">
      <button class="btn-show" id="btnShow">💡 Show Answer</button>
      <button class="btn-skip" id="btnSkip">Skip →</button>
    </div>
    <div class="feedback" id="feedbackBox"></div>
    <div class="solution-box" id="solutionBox"></div>
    <button class="btn-next show" id="btnNext" style="display:none">Next Question →</button>
  </div>

  <!-- ── RESULTS SCREEN ───────────────────────────────────── -->
  <div class="screen" id="resultsScreen">
    <div class="results-wrap">
      <div class="trophy" id="trophy">🏆</div>
      <h2 id="resTitle">Well done!</h2>
      <p  id="resMsg">Here's how you did:</p>
      <div class="stat-grid">
        <div class="stat-box"><div class="num" id="rCorrect">0</div><div class="lbl">Correct</div></div>
        <div class="stat-box"><div class="num" id="rTotal">0</div><div class="lbl">Attempted</div></div>
        <div class="stat-box"><div class="num" id="rPct">0%</div><div class="lbl">Score</div></div>
      </div>
      <button class="btn-restart" id="btnRestart">🔄 Practice Again</button>
    </div>
  </div>
</div>

<script>
"use strict";

/* ── QUESTION BANK ─────────────────────────────────────────────
   Fields: concept, sub, school, paper, section, marks,
           type ('mcq'|'short'|'word'),
           question, options (mcq only), answer, solution
──────────────────────────────────────────────────────────────── */
var Q = [

/* WHOLE NUMBERS – Place Value */
{concept:"Whole Numbers",sub:"Place Value",school:"Ai Tong",paper:"WA1",section:"Sec A",marks:1,type:"short",
 question:"Write five million, twenty thousand and six hundred in numerals.",
 answer:"5020600",solution:"5 020 600"},

{concept:"Whole Numbers",sub:"Place Value",school:"Ai Tong",paper:"WA1",section:"Sec A",marks:1,type:"short",
 question:"In 4 321 698, what is the value of the digit 3?",
 answer:"300000",solution:"The digit 3 is in the hundred-thousands place.\n3 x 100 000 = 300 000"},

{concept:"Whole Numbers",sub:"Place Value",school:"MGS",paper:"WA1",section:"Sec A (MCQ)",marks:1,type:"mcq",
 question:"How many hundreds are there in 1 453 800?",
 options:["(1)  8","(2)  800","(3)  14 538","(4)  145 380"],
 answer:"(3)  14 538",solution:"1 453 800 / 100 = 14 538"},

{concept:"Whole Numbers",sub:"Place Value",school:"Maha Bodhi",paper:"WA1",section:"Sec A (MCQ)",marks:1,type:"mcq",
 question:"In 280 945, the digit 8 is in the ________ place.",
 options:["(1)  hundreds","(2)  thousands","(3)  ten thousands","(4)  hundred thousands"],
 answer:"(3)  ten thousands",solution:"2 -> hundred thousands\n8 -> ten thousands\n0 -> thousands\n9 -> hundreds"},

{concept:"Whole Numbers",sub:"Place Value",school:"Catholic High",paper:"WA1",section:"Sec A (MCQ)",marks:2,type:"mcq",
 question:"What is the value of the digit 5 in 654 300?",
 options:["(1)  50","(2)  500","(3)  5 000","(4)  50 000"],
 answer:"(4)  50 000",solution:"6 -> hundred thousands, 5 -> ten thousands\n5 x 10 000 = 50 000"},

{concept:"Whole Numbers",sub:"Place Value",school:"Nan Hua",paper:"WA1",section:"Sec A (MCQ)",marks:1,type:"mcq",
 question:"In 2 468 505, what is the value of the digit 4?",
 options:["(1)  4 x 1 000","(2)  4 x 10 000","(3)  4 x 100 000","(4)  4 x 1 000 000"],
 answer:"(3)  4 x 100 000",solution:"2 -> millions, 4 -> hundred thousands\nValue = 4 x 100 000 = 400 000"},

{concept:"Whole Numbers",sub:"Place Value",school:"Nan Hua",paper:"WA1",section:"Sec B",marks:1,type:"short",
 question:"Write six million, four hundred and five thousand and eight in numerals.",
 answer:"6405008",solution:"6 405 008"},

{concept:"Whole Numbers",sub:"Place Value",school:"MGS",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"Write three million, forty-eight thousand and twenty-five in numerals.",
 answer:"3048025",solution:"3 048 025"},

{concept:"Whole Numbers",sub:"Place Value",school:"Maha Bodhi",paper:"WA1",section:"Sec B",marks:1,type:"short",
 question:"Write three million, forty-eight thousand and six in numerals.",
 answer:"3048006",solution:"3 048 006"},

/* WHOLE NUMBERS – Rounding */
{concept:"Whole Numbers",sub:"Rounding",school:"Ai Tong",paper:"WA1",section:"Sec A",marks:1,type:"short",
 question:"There are 219 962 people at a concert.\nRound this number to the nearest hundred.",
 answer:"220000",solution:"219 962 -> look at the tens digit (6 >= 5) -> round up\nAnswer: 220 000"},

{concept:"Whole Numbers",sub:"Rounding",school:"MGS",paper:"WA1",section:"Sec A (MCQ)",marks:1,type:"mcq",
 question:"Mr Lim bought a car for $172 560.\nWhich of the following is the price rounded to the nearest thousand?",
 options:["(1)  $170 000","(2)  $172 000","(3)  $173 000","(4)  $200 000"],
 answer:"(3)  $173 000",solution:"172 560 -> hundreds digit is 5 -> round up\n172 000 + 1000 = 173 000"},

{concept:"Whole Numbers",sub:"Rounding",school:"Maha Bodhi",paper:"WA1",section:"Sec A (MCQ)",marks:1,type:"mcq",
 question:"The population of a country is 4 million when rounded to the nearest thousand.\nWhat is the LARGEST possible population?",
 options:["(1)  4 000 290","(2)  4 000 490","(3)  4 000 690","(4)  4 000 890"],
 answer:"(2)  4 000 490",solution:"Rounded to nearest thousand = 4 000 000\nRange: 3 999 500 to 4 000 499\nLargest value in list that fits = 4 000 490"},

/* WHOLE NUMBERS – Four Operations */
{concept:"Whole Numbers",sub:"Four Operations",school:"Ai Tong",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"A number when multiplied by 30 has a product of 12 600.\nWhat is the quotient when this same number is divided by 6?",
 answer:"70",solution:"Number = 12 600 / 30 = 420\nQuotient = 420 / 6 = 70"},

{concept:"Whole Numbers",sub:"Four Operations",school:"MGS",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"Find the product of 209 and 600.",
 answer:"125400",solution:"209 x 600 = 125 400"},

{concept:"Whole Numbers",sub:"Four Operations",school:"MGS",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"160 x ___ = 400 000\nWhat is the missing number?",
 answer:"2500",solution:"400 000 / 160 = 2 500"},

{concept:"Whole Numbers",sub:"Four Operations",school:"MGS",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"What is the remainder when 10 050 is divided by 40?",
 answer:"10",solution:"10 050 / 40 = 251 remainder 10"},

{concept:"Whole Numbers",sub:"Four Operations",school:"MGS",paper:"WA1",section:"Sec A (MCQ)",marks:2,type:"mcq",
 question:"39 x 67 = 28 x 67 - 67 + ___ x 67\nFind the missing number.",
 options:["(1)  9","(2)  10","(3)  11","(4)  12"],
 answer:"(4)  12",solution:"39 = 28 - 1 + ?\n39 = 27 + ?\n? = 12"},

{concept:"Whole Numbers",sub:"Four Operations",school:"Catholic High",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"Find the value of 580 x 100.",
 answer:"58000",solution:"580 x 100 = 58 000"},

{concept:"Whole Numbers",sub:"Four Operations",school:"Nan Hua",paper:"WA1",section:"Sec A (MCQ)",marks:1,type:"mcq",
 question:"What is the product of 72 and 600?",
 options:["(1)  432","(2)  4 320","(3)  43 200","(4)  432 000"],
 answer:"(3)  43 200",solution:"72 x 600 = 72 x 6 x 100 = 432 x 100 = 43 200"},

{concept:"Whole Numbers",sub:"Four Operations",school:"Nan Hua",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"Mr Lee wanted to give his 37 students two pieces of chocolate each.\nChocolates were sold in packets of 8.\nHow many packets did Mr Lee have to buy?",
 answer:"10",solution:"Total chocolates = 37 x 2 = 74\n74 / 8 = 9 remainder 2\nNeed 10 packets (cannot buy half a packet)"},

/* WHOLE NUMBERS – BODMAS */
{concept:"Whole Numbers",sub:"Order of Operations (BODMAS)",school:"Ai Tong",paper:"WA1",section:"Sec A",marks:1,type:"short",
 question:"What is the value of  8 + (5 x 3 + 41) / 4?",
 answer:"22",solution:"Step 1: Inside brackets: 5 x 3 = 15, then 15 + 41 = 56\nStep 2: 56 / 4 = 14\nStep 3: 8 + 14 = 22"},

{concept:"Whole Numbers",sub:"Order of Operations (BODMAS)",school:"MGS",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"Find the value of  66 - (6 + 12) / 2 x 3.",
 answer:"39",solution:"Step 1: Brackets: 6 + 12 = 18\nStep 2: 18 / 2 = 9\nStep 3: 9 x 3 = 27\nStep 4: 66 - 27 = 39"},

{concept:"Whole Numbers",sub:"Order of Operations (BODMAS)",school:"Catholic High",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"Find the value of  3 x (18 - 4) - 12 / 6.",
 answer:"40",solution:"Step 1: Brackets: 18 - 4 = 14\nStep 2: 3 x 14 = 42\nStep 3: 12 / 6 = 2\nStep 4: 42 - 2 = 40"},

{concept:"Whole Numbers",sub:"Order of Operations (BODMAS)",school:"Nan Hua",paper:"WA1",section:"Sec A (MCQ)",marks:1,type:"mcq",
 question:"What is the value of  90 - 36 / (6 + 3) x 2?",
 options:["(1)  88","(2)  82","(3)  3","(4)  12"],
 answer:"(2)  82",solution:"Step 1: Brackets: 6 + 3 = 9\nStep 2: 36 / 9 = 4\nStep 3: 4 x 2 = 8\nStep 4: 90 - 8 = 82"},

/* WHOLE NUMBERS – Factors & LCM */
{concept:"Whole Numbers",sub:"Factors, Multiples & LCM",school:"Maha Bodhi",paper:"WA1",section:"Sec B",marks:1,type:"short",
 question:"List all the common factors of 12 and 18.",
 answer:"1 2 3 6",solution:"Factors of 12: 1, 2, 3, 4, 6, 12\nFactors of 18: 1, 2, 3, 6, 9, 18\nCommon factors: 1, 2, 3, 6"},

{concept:"Whole Numbers",sub:"Factors, Multiples & LCM",school:"MGS",paper:"WA1",section:"Sec A (MCQ)",marks:1,type:"mcq",
 question:"John has 270 stickers. He pastes them on pages that hold up to 8 stickers each.\nWhich of the following CANNOT be the total number of pages used?",
 options:["(1)  33","(2)  34","(3)  35","(4)  36"],
 answer:"(1)  33",solution:"Minimum pages needed = ceil(270/8) = 34\n33 pages can only hold 33 x 8 = 264 stickers < 270\nSo 33 is IMPOSSIBLE -> Answer: (1) 33"},

{concept:"Whole Numbers",sub:"Factors, Multiples & LCM",school:"MGS",paper:"WA1",section:"Sec C",marks:3,type:"word",
 question:"Ali started going to the library on 3 Jan and goes every 6 days.\nSamy started on 4 Jan and goes every 5 days.\nStarting from 1 January, how many times will they visit on the SAME day within 159 days?",
 answer:null,solution:"Ali's days: 3, 9, 15, 21, 27, 33, 39 ...\nSamy's days: 4, 9, 14, 19, 24, 29, 34, 39 ...\nFirst same day = day 9\nLCM(6, 5) = 30, so they meet every 30 days after that\nSame days: 9, 39, 69, 99, 129, 159\nAnswer: 6 times"},

/* WHOLE NUMBERS – Problem Solving */
{concept:"Whole Numbers",sub:"Problem Solving & Logic",school:"MGS",paper:"WA1",section:"Sec A (MCQ)",marks:2,type:"mcq",
 question:"Sally bought some sweets and ate 6. Then she gave away half the remaining sweets.\nShe was left with 48 sweets.\nWhich expression shows the number of sweets Sally had at first?",
 options:["(1)  (48 - 6) x 2","(2)  (48 + 6) x 2","(3)  48 x 2 - 6","(4)  48 x 2 + 6"],
 answer:"(4)  48 x 2 + 6",solution:"Work backwards:\nLeft = 48 -> before giving away = 48 x 2 = 96\nBefore eating = 96 + 6 = 102\nExpression: 48 x 2 + 6"},

{concept:"Whole Numbers",sub:"Problem Solving & Logic",school:"MGS",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"Amy multiplied a 3-digit number by a 1-digit number.\nShe pressed 8 instead of 5 by mistake. The difference in answers is 351.\nWhat should the correct product be?",
 answer:"585",solution:"Difference per unit = 8 - 5 = 3\n3-digit number = 351 / 3 = 117\nCorrect product = 117 x 5 = 585"},

{concept:"Whole Numbers",sub:"Problem Solving & Logic",school:"MGS",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"236 pupils stand in a line. There are 4 boys between every 2 girls. The first pupil is a girl.\nHow many boys are there in the line?",
 answer:"188",solution:"Pattern: G B B B B G B B B B ... (1 girl + 4 boys = 5 per group)\n236 / 5 = 47 remainder 1 (1 extra girl at end)\nBoys = 47 x 4 = 188"},

{concept:"Whole Numbers",sub:"Problem Solving & Logic",school:"Maha Bodhi",paper:"WA1",section:"Sec A (MCQ)",marks:2,type:"mcq",
 question:"The sum of two numbers is 489 and their difference is 195.\nWhat is the smaller number?",
 options:["(1)  147","(2)  294","(3)  342","(4)  684"],
 answer:"(1)  147",solution:"Larger = (489 + 195) / 2 = 342\nSmaller = (489 - 195) / 2 = 147"},

/* WHOLE NUMBERS – Patterns */
{concept:"Whole Numbers",sub:"Patterns & Sequences",school:"Maha Bodhi",paper:"WA1",section:"Sec C",marks:2,type:"short",

{concept:"Fractions",sub:"Multi-Step Word Problems",school:"Catholic High",paper:"WA1",section:"Sec B",marks:2,type:"word",

{concept:"Fractions",sub:"Multi-Step Word Problems",school:"Catholic High",paper:"WA1",section:"Sec C",marks:4,type:"word",

{concept:"Word Problems",sub:"Algebra & Model Method",school:"Ai Tong",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"There are twice as many $1 coins as $2 notes in a bag.\nThe total amount is $276.\nHow many $2 notes are there?",

{concept:"Word Problems",sub:"Algebra & Model Method",school:"Catholic High",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"The sum of Mrs Lim's and her son's age is 80 now.\nMrs Lim was 4 times as old as her son 5 years ago.\nHow old was Mrs Lim's son 5 years ago?",

{concept:"Word Problems",sub:"Algebra & Model Method",school:"Catholic High",paper:"WA1",section:"Sec C",marks:3,type:"short",

{concept:"Word Problems",sub:"Algebra & Model Method",school:"MGS",paper:"WA1",section:"Sec C",marks:3,type:"short",
 question:"Natalie had 791 more beads than her sister at first.\nNatalie bought 40 more; her sister gave away 72.\nIn the end, Natalie had 8 times as many beads as her sister.\nHow many beads did Natalie have at first?",
 answer:"992",solution:"Let sister = S, Natalie = S + 791\n(S+791+40) = 8(S-72)\nS + 831 = 8S - 576\n7S = 1407 -> S = 201\nNatalie at first = 201 + 791 = 992"},

{concept:"Word Problems",sub:"Algebra & Model Method",school:"Nan Hua",paper:"WA1",section:"Sec A (MCQ)",marks:2,type:"mcq",
 question:"Catherine had 10 more beads than Devi.\nAfter receiving 6 more beads from Devi, Catherine had 3 times as many as Devi.\nHow many beads did Catherine have in the end?",
 options:["(1)  14","(2)  24","(3)  27","(4)  33"],
 answer:"(4)  33",solution:"Let Devi = d, Catherine = d + 10\nAfter: Catherine = d+16, Devi = d-6\nd+16 = 3(d-6) -> d+16 = 3d-18 -> 34 = 2d -> d = 17\nCatherine in end = 17 + 16 = 33"},

{concept:"Word Problems",sub:"Algebra & Model Method",school:"Nan Hua",paper:"WA1 P2",section:"Long Answer",marks:3,type:"short",
 question:"Jessica had 80 marbles and Katy had 300 marbles.\nAfter each bought the same number of marbles, Katy had 3 times as many as Jessica.\nHow many marbles did each girl buy?",
 answer:"30",solution:"Let each buy x marbles\n300 + x = 3(80 + x)\n300 + x = 240 + 3x\n60 = 2x -> x = 30"},

{concept:"Word Problems",sub:"Algebra & Model Method",school:"Nan Hua",paper:"WA1",section:"Sec B",marks:2,type:"short",
 question:"Jill had 64 green and red balloons. 3/4 of them were red.\nShe bought blue balloons. There were 4 times as many green as blue balloons.\nHow many blue balloons did Jill buy?",

{concept:"Word Problems",sub:"Algebra & Model Method",school:"Catholic High",paper:"WA1",section:"Sec C",marks:4,type:"word",
 question:"Amy, Ben and Zoe had $2 100 altogether.\nBen had $45 less than Amy.\nZoe had thrice the total of Amy and Ben combined.\n(a) How much money did Ben have?\n(b) Zoe gave Amy some money so both had equal amounts. How much did Zoe have in the end?",
 answer:null,solution:"Let Amy = a, Ben = a-45, Zoe = 3(2a-45)\na + (a-45) + 3(2a-45) = 2100\n8a - 180 = 2100 -> a = 285\n(a) Ben = 285 - 45 = $240\n\n(b) Zoe = 6(285) - 135 = $1 575\nAmy = $285\nZoe + Amy = $1 860; each gets $930\nZoe in the end = $930"},

/* ── STATE ────────────────────────────────────────────────── */
var selConcept = "All";
var selMarks   = 0;
var pool = [], qIdx = 0, score = 0, attempted = 0, answered = false;

/* ── HELPERS ─────────────────────────────────────────────── */
function $(id){ return document.getElementById(id); }
function showScreen(id){
  ["filterScreen","practiceScreen","resultsScreen"].forEach(function(s){
    $(s).classList.remove("active");
  });
  $(id).classList.add("active");
}
function shuffle(a){
  var b = a.slice();
  for(var i=b.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=b[i];b[i]=b[j];b[j]=t;}
  return b;
}
function updateCount(){
  var n = Q.filter(function(q){
    return (selConcept==="All"||q.concept===selConcept) && (selMarks===0||q.marks===selMarks);
  }).length;
  $("filterCount").textContent = "Available: " + n + " question" + (n!==1?"s":"");
}
function updateScoreBar(){
  $("scoreLbl").textContent = score + " / " + attempted;
  var pct = attempted ? score/attempted : 0;
  $("starsLbl").textContent = pct>=0.8 ? "⭐⭐⭐" : pct>=0.5 ? "⭐⭐" : "⭐";
}

/* ── FILTER CHIPS ────────────────────────────────────────── */
document.getElementById("conceptChips").addEventListener("click", function(e){
  var chip = e.target.closest(".chip");
  if(!chip) return;
  document.querySelectorAll("#conceptChips .chip").forEach(function(c){ c.classList.remove("active"); });
  chip.classList.add("active");
  selConcept = chip.getAttribute("data-c");
  updateCount();
});

document.getElementById("marksChips").addEventListener("click", function(e){
  var btn = e.target.closest(".mark-btn");
  if(!btn) return;
  document.querySelectorAll("#marksChips .mark-btn").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active");
  selMarks = parseInt(btn.getAttribute("data-m"), 10);
  updateCount();
});

/* ── START ───────────────────────────────────────────────── */
$("btnStart").addEventListener("click", function(){
  var filtered = Q.filter(function(q){
    return (selConcept==="All"||q.concept===selConcept) && (selMarks===0||q.marks===selMarks);
  });
  if(!filtered.length){ alert("No questions match your filters. Please try different options!"); return; }
  pool = shuffle(filtered);
  qIdx = 0; score = 0; attempted = 0;
  var lbl = selConcept==="All" ? "All Topics" : selConcept;
  $("conceptBadge").textContent = lbl + (selMarks ? " · "+selMarks+"M" : "");
  $("scoreBar").style.display = "flex";
  showScreen("practiceScreen");
  renderQ();
});

/* ── RENDER QUESTION ─────────────────────────────────────── */
function renderQ(){
  answered = false;
  var q = pool[qIdx];
  var total = pool.length;

  $("qCounter").textContent = "Question " + (qIdx+1) + " of " + total;
  $("qMarkLabel").textContent = q.marks + " mark" + (q.marks!==1?"s":"");
  $("progFill").style.width = (qIdx/total*100) + "%";

  $("qMeta").innerHTML =
    '<span class="q-tag concept">'+q.concept+'</span>'+
    '<span class="q-tag school">'+q.school+' '+q.paper+'</span>'+
    '<span class="q-tag section">'+q.section+'</span>'+
    '<span class="q-tag marks">'+q.marks+' mark'+(q.marks!==1?"s":"")+'</span>';

  $("qText").textContent = q.question;
  $("feedbackBox").className = "feedback";
  $("feedbackBox").textContent = "";
  $("solutionBox").className = "solution-box";
  $("solutionBox").textContent = "";
  $("btnNext").style.display = "none";

  var og = $("optGrid");
  var ar = $("ansRow");
  var ai = $("ansInput");

  if(q.type==="mcq"){
    og.style.display = "grid";
    ar.style.display = "none";
    og.innerHTML = q.options.map(function(opt,i){
      return '<button class="opt-btn" data-i="'+i+'">'+opt+'</button>';
    }).join("");
    og.querySelectorAll(".opt-btn").forEach(function(btn){
      btn.addEventListener("click", function(){ checkMCQ(btn); });
    });
  } else {
    og.style.display = "none";
    ar.style.display = "flex";
    ai.value = "";
    ai.className = "ans-input";
    setTimeout(function(){ ai.focus(); }, 100);
  }
  updateScoreBar();
}

/* ── CHECK MCQ ───────────────────────────────────────────── */
function checkMCQ(btn){
  if(answered) return;
  answered = true;
  attempted++;
  var q = pool[qIdx];
  var chosen = q.options[parseInt(btn.getAttribute("data-i"),10)];
  var correct = chosen === q.answer;

  $("optGrid").querySelectorAll(".opt-btn").forEach(function(b){ b.disabled = true; });

  if(correct){
    btn.classList.add("correct");
    score++;
    showFeedback("correct","🎉 Correct! Well done!");
    doConfetti();
  } else {
    btn.classList.add("wrong");
    $("optGrid").querySelectorAll(".opt-btn").forEach(function(b){
      if(b.textContent.trim()===q.answer.trim()) b.classList.add("reveal");
    });
    showFeedback("wrong","❌ Not quite. Correct answer: "+q.answer);
  }
  if(q.solution) showSolution(q.solution);
  $("btnNext").style.display = "block";
  updateScoreBar();
}

/* ── CHECK SHORT ANSWER ──────────────────────────────────── */
$("btnCheck").addEventListener("click", checkShort);
$("ansInput").addEventListener("keydown", function(e){ if(e.key==="Enter") checkShort(); });

function checkShort(){
  if(answered) return;
  var q = pool[qIdx];
  if(q.type==="word" || !q.answer){ showHint(); return; }

  var raw = $("ansInput").value.trim().toLowerCase().replace(/\s+/g," ");
  var norm = function(s){ return (""+s).toLowerCase().replace(/[$,\s]/g,""); };

  var u = norm(raw), c = norm(q.answer);
  var numU = parseFloat(raw.replace(/[^0-9.\-]/g,"")), numC = parseFloat(q.answer.replace(/[^0-9.\-]/g,""));
  var match = u===c || u.includes(c) || c.includes(u) || (!isNaN(numU)&&!isNaN(numC)&&Math.abs(numU-numC)<0.02);

  answered = true;
  attempted++;
  if(match){
    $("ansInput").className = "ans-input correct";
    score++;
    showFeedback("correct","🎉 Correct! Fantastic!");
    doConfetti();
  } else {
    $("ansInput").className = "ans-input wrong";
    showFeedback("wrong","❌ Not quite. The answer is: "+q.answer);
  }
  if(q.solution) showSolution(q.solution);
  $("btnNext").style.display = "block";
  updateScoreBar();
}

/* ── SHOW ANSWER ─────────────────────────────────────────── */
$("btnShow").addEventListener("click", showHint);
function showHint(){
  var q = pool[qIdx];
  if(q.solution) showSolution(q.solution);
  else { showFeedback("info","💡 Work through the steps carefully. Ask your teacher if needed!"); }
  if(!answered){ answered=true; attempted++; $("btnNext").style.display="block"; updateScoreBar(); }
}

function showSolution(text){
  $("solutionBox").textContent = "Working:\n" + text;
  $("solutionBox").className = "solution-box show";
}
function showFeedback(type, msg){
  $("feedbackBox").className = "feedback " + type;
  $("feedbackBox").textContent = msg;
}

/* ── SKIP ────────────────────────────────────────────────── */
$("btnSkip").addEventListener("click", function(){
  if(!answered){ attempted++; }
  nextQ();
});

/* ── NEXT ────────────────────────────────────────────────── */
$("btnNext").addEventListener("click", nextQ);
function nextQ(){
  qIdx++;
  if(qIdx >= pool.length){ showResults(); return; }
  renderQ();
}

/* ── RESULTS ─────────────────────────────────────────────── */
function showResults(){
  $("progFill").style.width = "100%";
  showScreen("resultsScreen");
  var pct = attempted ? Math.round(score/attempted*100) : 0;
  $("rCorrect").textContent = score;
  $("rTotal").textContent   = attempted;
  $("rPct").textContent     = pct + "%";
  var t="🏅", h="Good effort!", m="Keep practising!";
  if(pct===100){ t="🏆"; h="Perfect score!"; m="Amazing — you got everything right! 🌟"; doConfetti(); doConfetti(); }
  else if(pct>=80){ t="🥇"; h="Excellent!"; m="You're doing really well!"; doConfetti(); }
  else if(pct>=60){ t="🥈"; h="Well done!"; m="Review the ones you missed."; }
  $("trophy").textContent = t;
  $("resTitle").textContent = h;
  $("resMsg").textContent = m;
}

/* ── RESTART ─────────────────────────────────────────────── */
$("btnRestart").addEventListener("click", function(){
  $("scoreBar").style.display = "none";
  showScreen("filterScreen");
});

/* ── CONFETTI ────────────────────────────────────────────── */
function doConfetti(){
  var colors = ["#667eea","#f59e0b","#10b981","#f43f5e","#8b5cf6","#06b6d4"];
  for(var i=0;i<28;i++){
    var p = document.createElement("div");
    p.className = "confetti-piece";
    var c = colors[Math.floor(Math.random()*colors.length)];
    var sz = 6+Math.random()*8;
    p.style.cssText = "left:"+Math.random()*100+"vw;background:"+c+";width:"+sz+"px;height:"+sz+"px;"+
      "border-radius:"+(Math.random()>.5?"50%":"3px")+";animation-delay:"+Math.random()*.4+"s;animation-duration:"+(2+Math.random())+"s";
    document.body.appendChild(p);
    setTimeout(function(){ p.remove(); }, 3500);
  }
}

/* ── INIT ────────────────────────────────────────────────── */
updateCount();
</script>
</body>
